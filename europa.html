const MATERIE={"relief": {"label": "🏔 Relieful", "tabs": {"trepte": {"title": "Trepte și unități morfostructurale", "sections": [{"h": "Altitudini extreme", "p": "Relieful Europei se înscrie altitudinal între <b>0 m</b> (nivelul mării) și <b>4807 m</b> — <b>[Vf. Mont Blanc]</b> din [Munții Alpi]. Dacă se iau în considerare <b>Marea Caspică</b> și <b>[Munții Caucaz]</b>, extremele sunt: <b>-28 m</b> în preajma Mării Caspice (cea mai joasă cotă) și <b>5642 m</b> — <b>[Vf. Elbrus]</b> din [Munții Caucaz] (cea mai înaltă cotă)."}, {"h": "Plăcile tectonice", "p": "Din punct de vedere tectonic, Europa aparține <b>plăcii Euroasiatice</b>. Principalele unități morfostructurale sunt împărțite în două mari grupe: <b>(1) unități de platformă precambriene</b> — reprezintă cel mai vechi nucleu continental: <b>Scutul Baltic</b> (în nordul Europei) și <b>Platforma Est-Europeană</b>; <b>(2) unități de orogen</b> — grupate în trei vârste: caledonice, hercinice și alpine."}, {"h": "Orogeneza caledonică (cei mai vechi munți)", "p": "Cuprinde <b>munți foarte vechi</b>, formați acum aproximativ <b>400 milioane ani</b>: <b>[Munții Scandinaviei]</b> (Norvegia, Suedia), <b>[Munții Scoției]</b> (în Marea Britanie) și <b>[Munții Grampiani]</b>. Sunt puternic erodați, cu vârfuri rotunjite, dar au fost reînălțați parțial în orogeneza alpină (de aceea în Scandinavia depășesc 2000 m)."}, {"h": "Orogeneza hercinică (munți vechi, erodați)", "p": "Cuprinde <b>munți vechi</b>, formați acum aproximativ <b>250–300 milioane ani</b>: <b>[Masivul Central Francez]</b>, <b>[Masivul Șistos Renan]</b>, <b>[Munții Vosgi]</b>, <b>[Munții Pădurea Neagră]</b>, <b>[Masivul Hartz]</b>, <b>[Munții Penini]</b>, <b>[Munții Cambrieni]</b>, <b>[Munții Rodopi]</b>, <b>[Munții Rila]</b>, <b>[Podișul Meseta]</b>, <b>[Podișul Boemiei]</b>, <b>[Podișul Ardeni]</b> și <b>[Munții Urali]</b>. Sunt în general sub 2000 m, cu forme rotunjite."}, {"h": "Orogeneza alpină (munți tineri, înalți)", "p": "Cuprinde <b>munții înalți, tineri</b> din sudul Europei, formați în ultimele <b>65 milioane ani</b>: <b>[Munții Alpi]</b>, <b>[Munții Pirinei]</b>, <b>[Munții Sierra Nevada]</b>, <b>[Munții Carpați]</b>, <b>[Munții Balcani]</b> (Stara Planina), <b>[Munții Pindului]</b>, <b>[Munții Dinarici]</b>, <b>[Munții Caucaz]</b>, <b>[Munții Apenini]</b>. Au altitudini mari (peste 2500 m), creste ascuțite, văi adânci și prezintă <b>relief glaciar montan</b>."}, {"h": "Vulcanismul în Europa", "p": "<b>Vulcanism stins (din neogen):</b> cel mai lung lanț vulcanic stins din Europa este localizat în <b>vestul Carpaților Orientali</b> (Călimani, Gurghiu, Harghita); apare și în <b>[Masivul Central Francez]</b> (regiunea Auvergne). <b>Vulcanism activ (actual):</b> se manifestă în zona mediteraneană — <b>Etna</b> (Sicilia, 3340 m), <b>Vezuviu</b> (lângă Napoli), <b>Stromboli</b> (Insulele Eoliene, Italia) — și în <b>Islanda</b>, prin vulcanul <b>Hekla</b>."}]}, "tipuri": {"title": "Tipuri genetice de relief", "sections": [{"h": "1. Relieful glaciar", "p": "Format prin <b>acțiunea de eroziune a ghețarilor</b>. Apare sub formă de: <b>circuri glaciare</b>, <b>văi glaciare</b> (în formă de „U”), <b>morene</b> (frontală, laterală, de fund), <b>lacuri glaciare</b>, creste ascuțite, șei de transfluență. Este prezent în:<br>• <b>Munții înalți de peste 1800 m</b> — [Munții Carpați] (ex. lacurile glaciare din Carpații Meridionali — Bucura, Zănoaga), [Munții Alpi], [Munții Pirinei], [Munții Caucaz] — relief glaciar montan <b>cuaternar</b> (vechi);<br>• <b>Munții foarte înalți de peste 3000 m</b> — [Munții Alpi], [Munții Caucaz] — relief glaciar montan <b>actual</b> (cu ghețari activi);<br>• <b>Nordul continentului</b> — Câmpia Nord-Europeană — relief glaciar continental de <b>calotă</b> (cu morene, drumlinuri, eskere, câmpii fluvio-glaciare)."}, {"h": "2. Relieful vulcanic", "p": "Format ca urmare a <b>activității vulcanice din neogen și din prezent</b>.<br><b>• Vulcanism stins:</b> [Munții Carpați] Orientali (vulcanul stins de la Racoș, județul Brașov), [Masivul Central Francez] (regiunea Auvergne).<br><b>• Vulcanism activ:</b> <b>Hekla</b> (Islanda), <b>Etna</b> (Sicilia), <b>Vezuviu</b> (lângă Napoli), <b>Stromboli</b>.<br>Forme specifice: conuri vulcanice, cratere, caldere, platouri vulcanice, dykes."}, {"h": "3. Relieful petrografic — pe carst", "p": "Se dezvoltă pe <b>roci calcaroase</b>. Forme: <b>lapiezuri, doline, chei, peșteri, polje, avene</b>. Apare în: <b>Podișul Karst</b> (Slovenia — locul de origine al termenului), [Munții Alpi] (peștera <b>Holoch</b> — cea mai lungă peșteră din lume), [Podișul Meseta] (Spania), Carpații Occidentali, Podișul Mehedinți (ex. <b>Podul lui Dumnezeu</b> de la Ponoare, județul Mehedinți)."}, {"h": "3b. Relieful petrografic — pe alte roci", "p": "<b>• Pe conglomerate</b> — stânci cu forme deosebite: <b>Babele</b>, <b>Sfinxul</b> (Munții Bucegi), stânci în Munții Ceahlău și Munții Ciucaș.<br><b>• Pe șisturi cristaline</b> — creste înalte și ascuțite: [Munții Alpi], [Munții Pirinei], [Munții Apenini], creasta Munților Făgăraș, Parâng, Rodna, Leaota.<br><b>• Pe nisipuri</b> — câmpuri de dune: <b>sud-vestul Franței</b> (dunele de la Arcachon — cele mai înalte din Europa), <b>Câmpia Mării Caspice</b>.<br><b>• Pe loess</b> — în zonele de câmpie: Câmpia Română, Câmpia Europei de Est."}, {"h": "4. Relieful fluvial (eroziune și acumulare)", "p": "Format prin <b>acțiunea apelor curgătoare</b>. Forme principale: <b>lunci</b> (zonele joase din lungul râurilor, inundabile), <b>terase</b> (trepte vechi de luncă, în lungul văilor), <b>văi</b> (în „V”, în chei, în defileu), <b>câmpii de acumulare</b>. Cele mai dezvoltate sunt <b>luncile largi și terasele</b> din lungul văilor intramontane și intradeluroase (ex. valea Mureșului, valea Oltului)."}, {"h": "5. Relieful fluvio-maritim", "p": "Format la <b>contactul fluviilor cu marea</b>. Forme: <b>delte</b> (acumulări de aluviuni: Delta Volgăi, Delta Dunării), <b>limane</b> (guri barate de cordoane litorale: Niprului, Nistrului), <b>estuare</b> (guri pâlnie săpate de maree: <b>Estuarul Elbei</b>, <b>Estuarul Tamisei</b>, Estuarul Senei)."}, {"h": "6. Relieful litoral (maritim)", "p": "Țărmurile Europei prezintă tipuri variate:<br><b>• Țărmuri cu fjorduri</b> — văi glaciare adânci, inundate de mare: <b>Norvegia</b>, vestul Scoției, Islanda.<br><b>• Țărmuri cu rias</b> — văi fluviale joase, inundate de mare: <b>nord-vestul Franței</b> (Bretania), Marea Britanie, NV Spaniei (Galicia).<br><b>• Țărmuri dalmatice</b> — coasta înaltă paralelă cu lanțurile montane, cu insule alungite: <b>Croația</b> (coasta dalmatică a Mării Adriatice).<br><b>• Țărmuri cu lagune</b> — Marea Wadden (Olanda), Laguna Veneției (Italia)."}]}, "unitati": {"title": "Unitățile majore de relief", "sections": [{"h": "A. MUNȚII — caledonici și hercinici", "p": "<b>1. [Munții Scandinaviei]</b> (Norvegia, Suedia) — caledonici (vechi), reînălțați alpin; <b>peste 2000 m</b>; ghețari, platouri, fjorduri (văi adânci umplute de apă).<br><b>2. [Masivul Central Francez]</b> — hercinic; <b>sub 2000 m</b>; relief vulcanic (Auvergne) și carstic.<br><b>3. [Masivul Șistos Renan]</b> (Germania) — hercinic; <b>600–800 m</b>; străbătut de Rin; relief vulcanic stins.<br><b>4. [Munții Urali]</b> — hercinici; lung lanț de <b>2000 km</b> între Europa și Asia; max <b>1894 m</b>; puternic erodați.<br><b>5. [Podișul Meseta]</b> (Spania) — munți hercinici reînălțați alpin; platouri pietroase 600–1000 m; relief carstic."}, {"h": "A. MUNȚII — alpini (tineri, înalți)", "p": "<b>6. [Munții Pirinei]</b> (Spania-Franța) — orogeneza alpină; <b>peste 3000 m</b>; ghețari doar pe vârfuri (fără văi glaciare mari).<br><b>7. [Munții Alpi]</b> — între Franța și Câmpia Panonică, <b>1200 km lungime</b>; alpină; max <b>4807 m (Mont Blanc)</b>; relief glaciar și carstic; turism intens (Chamonix, Davos, Innsbruck).<br><b>8. [Munții Apenini]</b> (Italia continentală + Sicilia) — alpină; <b>Vf. Gran Sasso 2914 m</b>; vulcani activi (Etna, Vezuviu, Stromboli).<br><b>9. [Munții Dinarici]</b> (Balcani de Vest) — alpină; peste <b>2500 m</b>; calcare → relief carstic.<br><b>10. [Munții Carpați]</b> (Slovacia, Ucraina, România, Serbia) — alpină; max <b>2655 m (Gerlachovka, Slovacia)</b>; <b>foarte fragmentați</b>, cu multe depresiuni și văi; relief divers — glaciar, carstic, vulcanic.<br><b>11. [Munții Balcani]</b> (Stara Planina, Bulgaria) — continuă Carpații; peste <b>2300 m</b>; șisturi, calcare, fliș.<br><b>12. [Munții Caucaz]</b> — alpină; <b>Vf. Elbrus 5642 m</b> — cel mai înalt din Europa; relief glaciar montan actual."}, {"h": "B. PODIȘURI", "p": "<b>1. [Podișul Ardeni]</b> (Belgia, Franța) — munți vechi erodați (hercinici); <b>600–700 m</b>.<br><b>2. [Podișul Bavariei]</b> (Germania) — format din <b>aluviuni aduse din Alpi</b> (origine sedimentară).<br><b>3. [Podișul Boemiei]</b> (Cehia) — încadrat de munți vechi (hercinici); altitudine <b>~343 m</b>.<br><b>4. [Podișul Valdai]</b> (Rusia) — vechi (precambrian); <b>sub 343 m</b>; aici izvorăsc Volga, Niprul și Dvina de Vest.<br><b>5. [Podișul Central Rus]</b> (Rusia) — pe rocă veche; <b>~250 m</b>; aici izvorăște Donul.<br><b>6. [Meseta Iberică]</b> (Spania) — vezi și „munți” — platou vechi reînălțat."}, {"h": "C. CÂMPII", "p": "<b>1. [Câmpia Nord-Europeană]</b> (Olanda → Polonia, prin Germania) — formată prin <b>acumulări glaciar-fluviale</b> în cuaternar; <b>sub 200 m</b>, cu multe coline (drumlinuri); râurile se varsă în Marea Nordului și Marea Baltică (Rin, Elba, Oder, Vistula).<br><b>2. [Câmpia Europei de Est]</b> (Rusia, Ucraina, Belarus) — <b>a doua cea mai mare câmpie din lume</b> după Amazon; include și podișuri joase; <b>sub 200 m</b>.<br><b>3. [Câmpia Padului]</b> (Italia) — formată din aluviuni aduse de râuri din Alpi; <b>sub 100 m</b>; cea mai dezvoltată regiune agricolă a Italiei.<br><b>4. [Câmpia Panonică]</b> (Ungaria și vecinii — Croația, Serbia, România de vest) — câmpie <b>tectonică</b> umplută cu aluviuni; zone joase (sub 150 m) și mai înalte (150–300 m).<br><b>5. [Câmpia Română]</b> — lângă Dunăre; tipuri diverse: <b>piemontane, tabulare, de subsidență</b>; altitudini <b>10–300 m</b>.<br><b>6. Câmpia Precaspică</b> (Rusia) — la est de Volga; sub nivelul mării (-28 m); climă semiaridă."}]}}}, "clima": {"label": "🌡 Clima Europei", "tabs": {"factori": {"title": "Factori și influențe", "sections": [{"h": "1. Creșterea latitudinii", "p": "Europa se întinde între aproximativ <b>35° și 70° latitudine nordică</b>, iar această poziție determină variații semnificative ale radiației solare și, implicit, ale temperaturilor. Pe măsură ce latitudinea crește (de la sud spre nord), <b>temperaturile medii anuale scad</b>. Vânturile de vest bat dinspre Oceanul Atlantic spre interiorul continentului și aduc mase de aer umed și relativ cald, ceea ce determină un regim pluviometric bogat pe țărmurile vestice. În lipsa barierelor montane, aceste mase de aer pot pătrunde adânc în interiorul continentului, influențând clima regiunilor centrale."}, {"h": "2. Altitudinea", "p": "Altitudinea influențează clima prin: <b>scăderea temperaturii cu ~0,6°C la fiecare 100 m înălțime</b>; creșterea cantității de precipitații, datorită condensării aerului în mișcare ascendentă; creșterea nebulozității și a duratei de menținere a stratului de zăpadă. Regiunile montane ([Munții Alpi], [Munții Carpați], [Munții Pirinei]) au un climat diferit față de regiunile joase, contribuind la <b>etajarea climatică</b>."}, {"h": "3. Curentul cald al Atlanticului de Nord", "p": "Acest curent oceanic cald, ramură a Curentului Golfului (<b>Gulf Stream</b>), încălzește apele din apropierea țărmurilor vestice ale Europei. Influența sa se resimte până în nordul Norvegiei, unde porturi aflate dincolo de Cercul Polar rămân deschise tot timpul anului, în ciuda latitudinii mari. Astfel, regiunile de coastă vestice (Franța, Marea Britanie, Norvegia) au <b>ierni blânde și veri răcoroase</b>."}, {"h": "Temperaturi medii anuale pe zone", "p": "Din nord spre sud: <b>0°C</b> în extremul nordic (înghețuri prelungite); <b>0–5°C</b> în Scandinavia (veri scurte și reci, ierni lungi și geroase); <b>5–10°C</b> în Europa de Est (veri secetoase, ierni geroase); <b>10°C</b> în Europa Centrală (veri moderate, ierni blânde); <b>10–15°C</b> în vest (veri răcoroase, ierni blânde, datorită Gulf Stream); <b>15–20°C</b> în sud (veri călduroase, ierni blânde — mediteraneean); <b>10°C</b> în estul Câmpiei Precaspice (veri foarte secetoase, ierni foarte geroase — continental excesiv)."}]}, "tipuri": {"title": "Tipuri de climat", "sections": [{"h": "1. Climatul temperat oceanic", "p": "Se dezvoltă în <b>vestul Europei</b>: Franța, țările Benelux, Arhipelagul Britanic, vestul Norvegiei. Ierni blânde (temperaturi frecvent peste 0°C), veri răcoroase (rar peste 22°C). Temperatura medie iarna variază de la <b>8°C în sud la -1°C în nord</b>. Temperatura medie vara: <b>15–22°C</b>. Precipitații frecvente și abundente (<b>800–1000 mm/an</b>), datorate vânturilor de vest. Frecvență mare a ceții, mai ales în regiunile litorale. Amplitudine termică anuală redusă (<b>5–10°C</b>). Vânturile de vest predominante mențin umiditatea și influențează vremea zilnică."}, {"h": "2. Climatul temperat continental", "p": "Specific <b>centrului și estului Europei</b>: Polonia, Ucraina, Rusia Europeană, România (parțial). Influențat de mase de aer continentale și nordice, reci iarna și calde vara. Ierni reci cu viscole și temperaturi negative persistente. Veri calde sau chiar caniculare în sud-estul Europei. <b>Precipitațiile scad spre est</b>: 600 mm/an în vestul regiunii, sub 400 mm în zonele estice. Amplitudine termică mare (<b>20–30°C</b>). În zonele cele mai estice se resimte un <b>climat excesiv (semiarid)</b>, cu extreme termice pronunțate."}, {"h": "2b. Climat temperat continental de tranziție", "p": "Zonă de tranziție între climatul oceanic (vest) și cel continental (est), acoperind Europa Centrală: Germania, Polonia de vest, Cehia, Slovacia, Austria, nord-vestul României. Prezintă caracteristici intermediare: amplitudine termică moderată (10–20°C), precipitații între 500–750 mm/an, cu influențe atlantice atenuate spre est."}, {"h": "3. Climatul mediteranean", "p": "Afectează <b>sudul Europei</b>, în special peninsulele Iberică, Italică și Balcanică. Se extinde din Portugalia până la Bosfor, influențând și insulele din Marea Mediterană. Două anotimpuri dominante: <b>vară caldă și uscată, iarnă blândă și umedă</b>. Temperatura medie în ianuarie: <b>5–10°C</b>. Temperatura medie în iulie: <b>20–25°C</b>. Precipitațiile sunt mai abundente toamna și iarna. Favorabil <b>agriculturii mediteraneene</b> (viță-de-vie, măslin, citrice)."}, {"h": "4. Climatul alpin (montan)", "p": "Se regăsește în lanțurile muntoase înalte: <b>[Munții Alpi], [Munții Pirinei], [Munții Carpați], [Munții Apenini], [Munții Balcani (Stara Planina)]</b>. Apare la altitudini mai mari de <b>2000 m</b>. Temperaturile scad semnificativ cu altitudinea. Precipitații abundente, <b>peste 1000 mm/an</b>, adesea sub formă de ninsoare. Nebulozitate crescută și strat gros de zăpadă iarna. Perioadă de vegetație scurtă și variații climatice semnificative pe verticală."}, {"h": "5. Climatul temperat rece (boreal)", "p": "Se dezvoltă în nordul Europei: centrul și nordul Suediei, Finlanda, nordul Rusiei Europene. Caracterizat prin <b>ierni lungi și reci</b>, veri scurte și răcoroase. Temperaturi medii anuale între 0 și 5°C. Precipitații moderate (400–600 mm/an). Acoperit de pădurea boreală (taiga) — conifere rezistente la ger."}, {"h": "6. Climatul subpolar", "p": "Prezent în <b>extremul nordic al Europei</b>: nordul Scandinaviei, Islanda, zonele arctice din Rusia. Ierni foarte reci și lungi (adesea sub <b>-20°C</b>). Veri foarte scurte, ușor mai blânde, dar reci în general. Precipitațiile sunt reduse (<b>sub 500 mm/an</b>), predominant sub formă de ninsoare. Vânturile polare influențează puternic clima. Terenul este afectat de <b>permafrost și tundră</b>."}, {"h": "Precipitații medii anuale — distribuție", "p": "Maxim: <b>peste 2000 mm/an</b> pe coasta vestică a Norvegiei (munții Scandinaviei captează umiditatea atlantică). <b>1000–1500 mm/an</b>: vestul Marii Britanii, Alpi, Dinarici. <b>800–1000 mm/an</b>: Europa de Vest (Franța, Germania de vest). <b>600–800 mm/an</b>: Europa Centrală. <b>500–600 mm/an</b>: Europa de Est. <b>400–500 mm/an</b>: Câmpia Europei de Est, estul Rusiei, zonele mediteraneene uscate. Minim: <b>sub 400 mm/an</b> în Câmpia Precaspică (climat excesiv)."}]}, "vanturi": {"title": "Vânturi europene", "sections": [{"h": "1. Vânturile polare", "p": "Suflă dinspre <b>Anticiclonul Polar</b> către Depresiunea Islandei (minimele subpolare). Transportă mase de aer foarte reci, care pot pătrunde în Europa de Nord și Centrală. Pot provoca <b>înghețuri tardive</b> chiar și în lunile de primăvară sau vară."}, {"h": "2. Vânturile de vest", "p": "Bat constant între <b>40° și 60° latitudine nordică</b>. Reprezintă vânturi planetare ce influențează semnificativ clima Europei Occidentale. Aduc mase de aer umed dinspre Oceanul Atlantic, provocând <b>precipitații bogate pe țărmurile vestice</b> ale continentului."}, {"h": "3. Föhnul", "p": "Vânt <b>cald și uscat</b>, care apare în [Munții Alpi] și [Munții Carpați]. Se formează când mase de aer umed escaladează un munte, pierd umezeală prin precipitații pe versantul dinspre vânt, iar pe versantul opus coboară uscat și încălzit. Contribuie la <b>topirea zăpezii și la încălziri bruște</b> în regiunile submontane."}, {"h": "4. Bora", "p": "Vânt <b>rece și violent</b>, care suflă pe litoralul Mării Adriatice, în special în Croația. Se formează prin acumularea aerului rece în spatele [Munților Dinarici], care apoi se prăbușește spre coasta caldă. Viteze foarte mari ale vântului, în special în <b>munții Velebit</b>."}, {"h": "5. Suhoveiul", "p": "Vânt <b>cald și uscat</b>, care bate dinspre Asia Centrală spre estul Europei. Poate provoca <b>secetă și ariditate</b> în regiunile afectate — sudul Rusiei, Ucraina, estul României."}, {"h": "6. Leveche (Sirocco)", "p": "Denumire regională pentru <b>Sirocco</b>, un vânt cald, uscat și prăfos. Se formează în nordul Africii și traversează Marea Mediterană, influențând clima peninsulelor sudice. Aduce temperaturi ridicate și <b>nisip saharian</b>, afectând mai ales Italia, Spania și Grecia."}]}}}, "resurse": {"label": "⛏ Resurse", "tabs": {"energetice": {"title": "Resurse energetice", "sections": [{"h": "Cărbunii", "p": "<b>Rusia</b> — Peciora, Munții Ural; <b>Ucraina</b> — Donbass; <b>Germania</b> — Ruhr (cel mai cunoscut bazin), Bazinul carbonifer Elba; <b>Polonia</b> — Silezia; <b>Regatul Unit</b> — Wales. Industria cărbunelui a fost baza Revoluției Industriale europene."}, {"h": "Petrolul", "p": "<b>Rusia</b> — N Mării Caspice, între Volga și Munții Ural (cele mai mari rezerve europene); <b>Regatul Unit și Norvegia</b> — exploatări offshore în Marea Nordului. Norvegia este cel mai mare producător european de petrol."}, {"h": "Gazele naturale", "p": "<b>Rusia</b> — cele mai mari rezerve de gaze naturale din lume; <b>Olanda</b> — zăcământul Groningen (cel mai mare din UE)."}]}, "metalifere": {"title": "Minereuri", "sections": [{"h": "Minereuri de fier și mangan", "p": "<b>Rusia</b> — Kursk-Belgorod (anomalia magnetică, cel mai mare zăcământ), Munții Ural; <b>Ucraina</b> — Krivoi Rog, Kerci; <b>Suedia</b> — Kiruna (Laponia). <b>Mangan</b>: Ucraina (Nikopol — unic în Europa)."}, {"h": "Minereuri neferoase", "p": "Rezerve importante în <b>Rusia, Spania, Polonia, Suedia, Finlanda</b>. Europa deține <b>1/3 din producția mondială de plumb</b> și <b>1/4 din zinc și cupru</b>."}, {"h": "Metale prețioase (Au, Ag)", "p": "<b>Rusia, Germania, Suedia</b> — principalele țări producătoare de aur și argint din Europa."}]}, "nemetalifere": {"title": "Nemetalifere și construcții", "sections": [{"h": "Zăcămintele nemetalifere", "p": "<b>Sulf</b>: Italia (Sicilia — vulcanogen), Polonia. <b>Sare</b>: Rusia, Ucraina, Germania, Polonia. <b>Săruri de potasiu</b>: Germania, Rusia, Franța."}, {"h": "Rocile de construcție", "p": "<b>Marmură</b>: Italia (Carrara — celebră în lume), Grecia, Portugalia, Spania. <b>Granit</b>: Spania, Italia, Regatul Unit, Finlanda."}]}, "suprafata": {"title": "Resurse de suprafață", "sections": [{"h": "Resursele de sol", "p": "<b>2/3 din suprafața Europei</b> sunt zone de câmpie, cu soluri fertile. Cele mai mari suprafețe arabile sunt în <b>Rusia, Ucraina, Belarus, Polonia</b>. Cernoziomurile ucrainene sunt printre cele mai fertile soluri ale lumii."}, {"h": "Pădurile", "p": "<b>1/3 din suprafața continentului</b> este acoperită de păduri, concentrate în: <b>Europa Nordică</b> (Scandinavia, Rusia de Nord — taiga), <b>zona montană alpină</b> și <b>masivele hercinice</b>. Industria forestieră: Rusia, Finlanda, Suedia, Franța, Italia, Germania."}, {"h": "Pășunile naturale", "p": "<b>Peninsula Scandinavă</b> și <b>Arhipelagul Britanic (Irlanda)</b> — zonele cu cele mai întinse pășuni naturale, care susțin creșterea extensivă a ovinelor și bovinelor."}, {"h": "Resursele de apă", "p": "<b>Rezerve mari</b>: Nordul Rusiei, Scandinavia. <b>Rezerve moderate</b>: centrul Europei. <b>Deficit hidric</b>: sudul și estul Europei (zone mediteraneene și semiaride precaspice)."}]}}}, "economie": {"label": "🏭 Economie", "tabs": {"agricultura": {"title": "Agricultura", "sections": [{"h": "Aspecte generale", "p": "Agricultură <b>intensivă</b> în centrul și vestul Europei. <b>Agricultură de piață</b> (destinată comercializării) în vestul Europei. <b>Agricultură de subzistență și piață</b> în fostele țări comuniste."}, {"h": "Cultura plantelor", "p": "<b>Cereale</b>: grâu și porumb — vestul și centrul Europei; secară, orz, ovăz la latitudini mai mari. <b>Plante tehnice</b>: sfecla de zahăr, floarea-soarelui (Rusia, Ucraina, România), rapiță (Franța, Germania), in, cânepă. <b>Cartofi</b>: jumătate din producția mondială (Rusia, Ucraina, Polonia). <b>Legumicultură</b>: în zonele periurbane. <b>Viticultură</b>: Europa de sud și sud-est. <b>Măslini</b>: Italia, Spania, Grecia — Europa asigură <b>3/4 din producția mondială de măsline</b>."}, {"h": "Creșterea animalelor", "p": "Caracter <b>intensiv, industrial</b> în Europa de Vest și Centrală. <b>Ovine și bovine</b>: forme tradiționale în Europa de Est și Sud. <b>Ovine</b> în regiuni montane din Rusia, Franța, Germania. <b>Bovine</b> în sistem extensiv și transhumant în Europa estică și sudică. <b>Porcine</b>: Germania, Rusia, Polonia, sudul și sud-estul Europei. <b>Cabaline</b>: Rusia, România, Ucraina. <b>Sericicultura</b> (viermi de mătase): Europa de Sud."}]}, "industria": {"title": "Industria", "sections": [{"h": "Extractivă și energetică", "p": "<b>Cărbuni</b>: NV Europei — bazinele Ruhr (Germania), Silezia (Polonia și Cehia). <b>Petrol</b>: Marea Nordului (UK, Norvegia). <b>Gaze naturale</b>: Federația Rusă (cele mai mari rezerve mondiale), Marea Britanie, Olanda, Norvegia. <b>Hidroenergie</b>: țări alpine (Elveția, Austria), țări scandinave (Norvegia, Suedia). <b>Energia mareelor</b>: Franța (La Rance). <b>Energia geotermală</b>: Islanda."}, {"h": "Siderurgică", "p": "<b>Vestul Europei</b>: Germania, Franța, Marea Britanie. <b>Estul Europei</b>: Ucraina, Rusia. <b>Materii prime</b>: minereuri de fier, cocs, minereuri de mangan. <b>Produse obținute</b>: fontă (în furnale), oțeluri (în cuptoare electrice sau cu oxigen), produse laminate."}, {"h": "Constructoare de mașini", "p": "<b>Autoturisme</b>: Germania (lider), Franța, Spania, Marea Britanie. <b>Avioane</b>: Franța, Marea Britanie, Rusia. <b>Echipamente industriale</b>: Cehia, Suedia."}, {"h": "Chimică, lemn și altele", "p": "<b>Chimică</b>: industria clorosodică (sodă caustică, sodă calcinată), pesticide, cosmetice, farmaceutice, petrochimică. <b>Lemn</b>: Rusia, Finlanda, Suedia, Franța, Italia, Germania. <b>Materiale de construcție</b>: ciment, ceramică, sticlă, prefabricate. <b>Industrie ușoară textilă</b>: Franța, Regatul Unit. <b>Bumbac</b>: Manchester, Milano. <b>Lână</b>: Marea Britanie, Franța, Germania. <b>Mătase</b>: Franța, Italia, Elveția."}]}, "transport": {"title": "Transporturi", "sections": [{"h": "Feroviare și rutiere", "p": "Magistralele feroviare traversează Europa pe direcția V-E între <b>Lisabona, Paris, Varșovia, Moscova</b>. <b>Noduri feroviare</b>: Moscova, Paris, Berlin. <b>Trenuri de mare viteză (TGV)</b>: Franța și alte țări din vest. <b>Rutiere</b>: 6,6 milioane km lungime totală; autostrăzi dezvoltate în Europa de Vest."}, {"h": "Fluviale", "p": "<b>Artere navigabile</b>: Rin, Dunăre, Volga, Sena, Tamisa. <b>Duisburg (pe Rin)</b> — locul I în Europa la traficul de mărfuri. <b>Basel</b> pe Dunăre, <b>Galați, Rotterdam</b> (port fluvio-maritim). <b>Flote fluviale importante</b>: Olanda, Germania, Rusia."}, {"h": "Maritime", "p": "<b>Flote maritime importante</b>: Grecia, Malta, Franța, Germania, Italia, Rusia. <b>Porturi</b>: <b>Rotterdam — locul I în Europa la traficul de mărfuri</b>, Anvers (Belgia), Hamburg, Marsilia, Amsterdam, Constanța."}, {"h": "Aeriene și speciale", "p": "Europa e pe <b>locul II în lume</b> la numărul de pasageri și traficul de mărfuri. <b>Companii</b>: Lufthansa, Al Italia. <b>Aeroporturi mari</b>: <b>Heathrow (Londra) — cel mai mare trafic de pasageri din Europa</b>, Frankfurt am Main, Leonardo da Vinci (Roma). <b>Transporturi speciale</b>: conducte (petrol, gaze — Rusia, Polonia, Germania, Cehia, Ungaria), linii de înaltă tensiune, telecomunicații."}]}, "comert_turism": {"title": "Comerț și turism", "sections": [{"h": "Schimburile comerciale", "p": "<b>6 țări europene</b> se remarcă la exportul mondial: <b>Germania</b> (lider), Franța, Italia, Marea Britanie, Olanda, Belgia. <b>Se importă</b>: combustibili minerali, minereuri, produse agricole tropicale. <b>Se exportă</b>: produse industriale, semifinite și finite. <b>Balanța comercială excedentară</b>: Germania, Olanda, Danemarca."}, {"h": "Turism balnear maritim", "p": "<b>Litoralul mediteranean</b>: Franța (Nisa, Cannes), Spania (Insulele Baleare), Italia, Turcia, Grecia (Creta, Rodos, Corfu). <b>Litoralul Mării Negre</b>: Rusia (Soci), Bulgaria (Varna), România (Mamaia). <b>Litoralul atlantic</b>: Franța (Biarritz), Spania (San Sebastian), Portugalia (Lagos)."}, {"h": "Turism montan", "p": "<b>Munții Alpi</b>: Austria (Innsbruck), Elveția (Davos). <b>Munții Carpați</b>: România (Poiana Brașov), Polonia (Zakopane). Sporturi de iarnă, sporturi montane."}, {"h": "Cură balneară și cultural", "p": "<b>Cură balneară</b> (ape minerale și termale): Franța (La Vichy), Cehia (Karlovy Vary), România (Băile Herculane). <b>Turism cultural-istoric</b>: Paris, Roma, Londra, Berlin, Madrid, Veneția, Florența — orașe cu patrimoniu cultural vast."}]}}}, "hidro": {"label": "💧 Hidrografia", "tabs": {"generalitati": {"title": "Generalități", "sections": [{"h": "Caracteristici generale", "p": "Europa are o rețea hidrografică <b>densă, variată și relativ tânără</b>. Comparativ cu alte continente, fluviile europene sunt în general <b>scurte</b> (sub 1500 km, cu excepția câtorva) și <b>navigabile pe distanțe mari</b>. Sunt legate între ele prin numeroase canale (Rin–Main–Dunăre, Volga–Don, Volga–Marea Baltică). Densitatea hidrografică este mai mare în vest (climat oceanic, precipitații abundente) și scade spre est și sud-est."}, {"h": "Bazinele oceanice (cumpăna apelor)", "p": "<b>1. Bazinul Atlantic</b> (vest) — fluvii care se varsă în Marea Nordului, Marea Mânecii, Marea Baltică și Atlantic: <b>Tamisa, Sena, Loara, Garona, Tajo, Rin, Elba, Vistula, Oder</b>. <b>2. Bazinul Mediteranean</b> (sud): <b>Ebro, Rhône, Pad</b>. <b>3. Bazinul pontic (Marea Neagră)</b>: <b>Dunărea, Nipru, Nistru, Don</b> (prin Marea Azov). <b>4. Bazinul caspic (endoreic)</b> — fără ieșire la ocean: <b>Volga, Ural</b>. <b>5. Bazinul arctic</b> (nord): <b>Peciora, Dvina de Nord</b>. Cumpăna principală a apelor trece prin [Munții Urali], [Munții Caucaz], [Munții Alpi], [Munții Carpați], [Munții Pădurea Neagră], [Munții Scandinaviei]."}, {"h": "Tipuri de regimuri hidrologice", "p": "<b>Regim pluvial</b> (alimentare din ploi, debit maxim iarna): fluvii din vestul Europei — <b>Sena, Tamisa, Loara</b>. <b>Regim nival</b> (alimentare din topirea zăpezilor, debit maxim primăvara): fluvii din nordul și estul Europei — <b>Volga, Don, Peciora</b>. <b>Regim glaciar</b> (alimentare din ghețari, debit maxim vara): râuri alpine — afluenții superiori ai Rinului și Rhônului. <b>Regim mixt (pluvio-nival)</b>: cele mai multe fluvii mari — <b>Dunărea, Rinul</b>."}, {"h": "Tipuri de guri de vărsare", "p": "<b>Deltă</b> — acumulare de aluviuni; mări cu maree slabe: <b>Dunărea</b> (Marea Neagră), <b>Volga</b> (Marea Caspică), <b>Rinul</b> (Marea Nordului), <b>Padul</b> (Marea Adriatică), <b>Rhônul</b> (Marea Mediterană), <b>Ebro</b> (Marea Mediterană). <b>Estuar</b> — gură pâlnie săpată de mareele puternice: <b>Sena, Tamisa, Elba, Garona</b>. <b>Liman</b> — gură barată de un cordon litoral: <b>Niprul, Nistrul, Niemen</b>. <b>Fjord</b> — vale glaciară inundată de mare: coasta Norvegiei și Scoției."}]}, "fluvii": {"title": "Fluvii / Râuri", "sections": [{"h": "Volga — cel mai lung fluviu al Europei", "p": "<b>Lungime: 3530 km</b>. Izvorăște din [Podișul Valdai] (Rusia) și se varsă în <b>Marea Caspică prin deltă</b>. Aparține <b>bazinului endoreic caspic</b> (nu ajunge la ocean). Pe Volga sunt construite numeroase lacuri de acumulare (Rîbinsk, Kuibîșev, Volgograd). Afluentul principal: <b>Kama</b>. Conectată cu Donul prin Canalul Volga–Don."}, {"h": "Dunărea — al doilea fluviu european", "p": "<b>Lungime: 2860 km</b>. Izvorăște din [Munții Pădurea Neagră] (Germania) și se varsă în <b>Marea Neagră prin deltă</b> (Delta Dunării — Patrimoniu UNESCO). Traversează <b>10 țări</b>, cel mai internațional fluviu din lume: Germania, Austria, Slovacia, Ungaria, Croația, Serbia, România, Bulgaria, R. Moldova, Ucraina. <b>4 capitale</b> pe Dunăre: Viena, Bratislava, Budapesta, Belgrad. Afluenți: Tisa, Sava, Drava, Morava, <b>Prut, Olt, Mureș, Siret</b>. Conectată cu Rinul prin Canalul Rin–Main–Dunăre."}, {"h": "Ural", "p": "<b>Lungime: 2428 km</b>. Izvorăște din [Munții Urali] și se varsă în <b>Marea Caspică</b>. Bazin endoreic. Considerat limita convențională între Europa și Asia."}, {"h": "Nipru (Dnepr)", "p": "<b>Lungime: 2201 km</b>. Izvorăște din Rusia (Pod. Valdai), traversează Belarus și Ucraina, se varsă în <b>Marea Neagră prin liman</b>. Importantă hidroenergie (Zaporojia)."}, {"h": "Don", "p": "<b>Lungime: 1870 km</b>. Izvorăște din [Podișul Central Rus] și se varsă în <b>Marea Azov</b>. Conectat cu Volga prin Canalul Volga–Don."}, {"h": "Peciora", "p": "<b>Lungime: 1809 km</b>. Izvorăște din [Munții Urali] și se varsă în <b>Marea Barents</b>. Bazinul arctic; traversează tundra rusească."}, {"h": "Kama", "p": "<b>Lungime: 1805 km</b>. Cel mai mare afluent al Volgăi; izvorăște din [Munții Urali]."}, {"h": "Nistru", "p": "<b>Lungime: 1352 km</b>. Izvorăște din [Munții Carpați] (Ucraina) și se varsă în <b>Marea Neagră prin liman</b>. Formează granița între R. Moldova și Ucraina."}, {"h": "Rin (Rhein)", "p": "<b>Lungime: 1233 km</b>. Izvorăște din [Munții Alpi] (Elveția) și se varsă în <b>Marea Nordului prin deltă</b> (la Rotterdam — cel mai mare port al Europei). Cel mai important fluviu economic al Europei. Traversează 6 țări (Elveția, Liechtenstein, Austria, Germania, Franța, Olanda). <b>Duisburg</b> — cel mai mare port fluvial al Europei."}, {"h": "Elba (Labe)", "p": "<b>Lungime: 1094 km</b>. Izvorăște din [Munții Sudeți] (Cehia) și se varsă în <b>Marea Nordului prin estuar</b> (la Hamburg)."}, {"h": "Vistula (Wisła)", "p": "<b>Lungime: 1047 km</b>. Cel mai lung fluviu al Poloniei. Izvorăște din Munții Beskizi și se varsă în <b>Marea Baltică</b> (golful Gdansk). Traversează capitala Varșovia."}, {"h": "Tajo (Tejo)", "p": "<b>Lungime: 1038 km</b>. Cel mai lung fluviu al Peninsulei Iberice. Spania → Portugalia, se varsă în <b>Atlantic prin estuar</b> (la Lisabona)."}, {"h": "Daugava (Dvina de Vest)", "p": "<b>Lungime: 1020 km</b>. Rusia → Belarus → Letonia, se varsă în <b>Marea Baltică</b> la Riga."}, {"h": "Loara (Loire)", "p": "<b>Lungime: 1012 km</b>. Cel mai lung fluviu al Franței. Izvorăște din [Masivul Central Francez] și se varsă în <b>Atlantic</b>. Cunoscut pentru castelele de pe valea sa."}, {"h": "Niemen (Neman)", "p": "<b>Lungime: 937 km</b>. Belarus, Lituania, Rusia (Kaliningrad). Se varsă în <b>Marea Baltică prin liman</b>."}, {"h": "Ebro", "p": "<b>Lungime: 930 km</b>. Izvorăște din Munții Cantabrici (NV Spaniei) și se varsă în <b>Marea Mediterană prin deltă</b>."}, {"h": "Mosa (Meuse)", "p": "<b>Lungime: 925 km</b>. Franța → Belgia → Olanda. Se varsă în <b>Marea Nordului</b>."}, {"h": "Oder (Odra)", "p": "<b>Lungime: 854 km</b>. Izvorăște din [Munții Sudeți] (Cehia) și se varsă în <b>Marea Baltică</b>. Formează granița dintre Polonia și Germania."}, {"h": "Rhône (Ronul)", "p": "<b>Lungime: 812 km</b>. Izvorăște din [Munții Alpi] (Elveția), traversează Lacul Geneva, apoi Franța, se varsă în <b>Marea Mediterană prin deltă</b> (Camargue)."}, {"h": "Sena (Seine)", "p": "<b>Lungime: 776 km</b>. Izvorăște din Pod. Langres și se varsă în <b>Marea Mânecii prin estuar</b> (la Le Havre). Traversează Parisul."}, {"h": "Pad (Po)", "p": "<b>Lungime: 652 km</b>. Cel mai lung fluviu al Italiei. Izvorăște din [Munții Alpi] și se varsă în <b>Marea Adriatică prin deltă</b>."}, {"h": "Garona (Garonne)", "p": "<b>Lungime: 647 km</b>. Izvorăște din [Munții Pirinei] și se varsă în <b>Atlantic prin estuar</b> (Estuarul Gironde, la Bordeaux)."}, {"h": "Tamisa (Thames)", "p": "<b>Lungime: 346 km</b>. Cel mai important fluviu al Angliei. Se varsă în <b>Marea Nordului prin estuar</b>. Traversează Londra."}, {"h": "Prut", "p": "<b>Lungime: 953 km</b>. Afluent al Dunării. Izvorăște din [Munții Carpați] (Ucraina); formează granița între România și R. Moldova."}]}, "lacuri": {"title": "Lacuri", "sections": [{"h": "Lacuri tectonice", "p": "Formate prin <b>scufundări tectonice</b> ale scoarței terestre. Sunt în general <b>adânci</b>, cu suprafețe variabile. <b>Marea Caspică</b> — cel mai mare lac al lumii (371.000 km², adâncime max 1025 m); de fapt un fost golf marin izolat. <b>Lacul Balaton</b> — Ungaria (594 km²); cel mai mare lac al Europei Centrale. <b>Lacul Ohrid</b> — Macedonia de Nord/Albania (358 km², adânc 288 m); <b>cel mai vechi lac al Europei</b> (peste 3 milioane ani); UNESCO. <b>Lacul Skadar</b> — Muntenegru/Albania (391 km²). <b>Lacul Prespa</b> — Macedonia/Albania/Grecia (273 km²)."}, {"h": "Lacuri tectono-glaciare", "p": "Formate prin combinația dintre scufundări tectonice și acțiunea ghețarilor cuaternari. Specifice <b>nordului Europei</b>. <b>Lacul Ladoga</b> — Rusia (17.700 km²); <b>cel mai mare lac al Europei</b> (excluzând Caspica); drenat de râul Neva. <b>Lacul Onega</b> — Rusia (9.720 km²); al doilea ca mărime. <b>Lacul Peipsi (Ciudskoe)</b> — Estonia/Rusia (3.555 km²)."}, {"h": "Lacuri glaciare", "p": "Formate prin <b>acțiunea ghețarilor cuaternari</b>; adesea alungite, dispuse în lanțuri, ocupând foste văi glaciare. Specifice <b>Scandinaviei, Finlandei și Alpilor</b>. <b>Vänern</b> — Suedia (5.650 km²); <b>cel mai mare lac al UE</b>. <b>Saimaa</b> — Finlanda (4.400 km²). <b>Vättern</b> — Suedia (1.856 km²). <b>Mälaren</b> — Suedia (Stockholm). <b>Päijänne, Inari</b> — Finlanda. În <b>[Munții Alpi]</b>: <b>Lacul Geneva (Léman)</b> — Elveția/Franța (580 km²), străbătut de Rhône; <b>Lacul Constanța (Bodensee)</b> — Germania/Elveția/Austria (536 km²), străbătut de Rin; <b>Lacul Garda</b> — cel mai mare al Italiei (370 km²); <b>Maggiore</b>, <b>Como</b> (Italia). <b>Loch Ness</b> — Scoția. <b>Finlanda</b> e supranumită „țara celor 1000 de lacuri” (peste 188.000 lacuri)."}, {"h": "Lacuri vulcanice", "p": "Formate în <b>cratere de vulcani stinși</b> (caldere) sau prin baraj de lavă. Apar în [Masivul Central Francez] (Auvergne) și mai ales în <b>[Munții Apenini]</b>. <b>Italia centrală</b>: <b>Bolsena</b> (113 km², cel mai mare lac vulcanic al Europei), <b>Bracciano</b>, <b>Albano</b>, <b>Nemi</b>, <b>Vico</b>."}, {"h": "Lacuri carstice", "p": "Formate în <b>depresiuni pe roci calcaroase</b> (doline, polje, peșteri prăbușite). Caracteristice zonelor cu carst dezvoltat: [Munții Dinarici] (Slovenia, Croația, Bosnia), Pod. Karst (Slovenia), Carpații Occidentali. Lacuri mici, adesea temporare."}, {"h": "Lacuri litorale (limane și lagune)", "p": "<b>Lagune</b> — formate prin bararea unor goluri marine de cordoane litorale: Marea Wadden (Olanda/Germania/Danemarca), Laguna Veneției (Italia). <b>Limane fluvio-maritime</b>: gura Niprului, Nistrului, Bugului (Marea Neagră). <b>Limane fluviale</b>: Razim, Sinoie pe litoralul românesc."}, {"h": "Lacuri antropice (de baraj)", "p": "Formate prin <b>baraje construite de om</b> pe râuri și fluvii — pentru hidroenergie, irigații, alimentare cu apă. <b>Pe Volga</b>: Rîbinsk, Kuibîșev, Volgograd. <b>Pe Nipru</b>: Kremenciuk, Kahovka. <b>Pe Dunăre</b>: <b>Porțile de Fier I și II</b> (graniță România–Serbia, cel mai mare baraj de pe Dunăre). Numeroase pe Rin, Rhône."}]}, "mari": {"title": "Mări", "sections": [{"h": "Bazinul Atlantic", "p": "<b>Marea Norvegiei</b> și <b>Marea Nordului</b> — bogate în pește și petrol/gaze offshore. <b>Marea Mânecii (La Manche)</b> — separă Insulele Britanice de Franța (sub ea trece Tunelul). <b>Marea Baltică</b> — mare puțin sărată, închisă, înconjurată de 9 țări; ape mai reci. <b>Marea Albă</b> și <b>Marea Barents</b> — în arcticul rusesc; influențate de Curentul Atlanticului de Nord (port Murmansk neînghețat)."}, {"h": "Bazinul Mediteranean", "p": "<b>Marea Mediterană</b> — comunică cu Atlanticul prin <b>Strâmtoarea Gibraltar</b> (cu Marea Roșie prin Canalul Suez). Subdiviziuni: <b>Marea Ligurică, Marea Tireniană, Marea Adriatică</b> (între Italia și Balcani), <b>Marea Ionică</b>, <b>Marea Egee</b> (cu insule grecești), <b>Marea Cretei</b>. Mare caldă, salină, cu maree slabe — ideală pentru turism și agricultura mediteraneană."}, {"h": "Bazinul pontic", "p": "<b>Marea Neagră</b> — comunică cu Marea Mediterană prin: <b>Bosfor → Marea Marmara → Dardanele → Marea Egee</b>. Salinitate redusă (17‰) datorită aportului mare de apă dulce de la Dunăre, Nipru, Nistru, Don. Sub 200 m apă, lipsită de oxigen (sulf de hidrogen). <b>Marea Azov</b> — comunică cu Marea Neagră prin <b>Strâmtoarea Kerci</b>; cea mai mică și cea mai puțin adâncă mare a lumii (max 14 m)."}, {"h": "Bazinul caspic (endoreic)", "p": "<b>Marea Caspică</b> — cel mai mare lac al lumii (371.000 km²), considerat tradițional „mare”. Endoreic (fără ieșire la ocean). Salinitate scăzută (12‰), variabilă regional. Bogată în pește (sturioni — caviar) și hidrocarburi (petrol, gaze)."}]}}}, "general": {"label": "🌍 Caracteristici generale", "tabs": {"pozitie": {"title": "Poziție și dimensiuni", "sections": [{"h": "Emisfera și poziția geografică", "p": "Europa se află în <b>Emisfera Nordică</b> și <b>Emisfera Estică</b> (aproape în totalitate). Se extinde între aproximativ <b>35° latitudine nordică</b> (Capul Tarifa, Spania — extremul sudic) și <b>71° latitudine nordică</b> (Capul Nord / Nordkapp, Norvegia — extremul nordic). Pe longitudine, se extinde de la <b>~9° longitudine vestică</b> (Capul Roca, Portugalia) până la <b>~66° longitudine estică</b> ([Munții Urali], Rusia). Europa este considerată <b>subcontinent al Eurasiei</b>, delimitată convențional de Asia prin [Munții Urali], râul Ural, Marea Caspică, [Munții Caucaz], Marea Neagră și Strâmtoarea Bosfor."}, {"h": "Puncte extreme", "p": "<b>Nordul:</b> Capul Nord (Nordkapp) — <b>71°10' N</b> — nordul Norvegiei (insula Magerøya). Cel mai nordic punct continental accesibil.<br><b>Sudul:</b> Capul Tarifa (Punta Marroqui) — <b>35°59' N</b> — sudul Spaniei (lângă Gibraltar). Cel mai sudic punct continental.<br><b>Vestul:</b> Capul Roca (Cabo da Roca) — <b>9°30' V</b> — Portugalia (lângă Lisabona). Cel mai vestic punct continental.<br><b>Estul:</b> [Munții Urali] (Vârful Narodnaia) — <b>~66° E</b> — Rusia. Granița convențională Europa-Asia."}, {"h": "Dimensiuni", "p": "<b>Suprafața:</b> aproximativ <b>10,5 milioane km²</b> (inclusiv insulele), reprezentând ~7% din uscatul terestru. <b>Lungimea maximă N-S:</b> ~3800 km (de la Capul Nord la Capul Tarifa). <b>Lungimea maximă V-E:</b> ~6000 km (de la Capul Roca la Munții Ural). <b>Lungimea țărmurilor:</b> aproximativ <b>38.000 km</b> — una dintre cele mai mari raportate la suprafață, datorită peninsulelor și insulelor numeroase. <b>Altitudinea medie:</b> ~300 m."}, {"h": "Insulele principale", "p": "<b>Marea Britanie</b> (~209.000 km²) — cea mai mare insulă a Europei. <b>Islanda</b> (~103.000 km²) — a doua ca mărime, în Atlantic. <b>Irlanda</b> (~70.000 km²) — în Atlantic, vest. <b>Sicilia</b> (~25.700 km²) — cea mai mare insulă mediteraneană. <b>Sardinia</b> (~24.000 km²) — Italia. <b>Cipru</b> (~9.250 km²) — Mediterana de Est. <b>Corsica</b> (~8.700 km²) — Franța. <b>Creta</b> (~8.300 km²) — Grecia. <b>Insulele Baleare</b> (Mallorca, Menorca, Ibiza) — Spania. <b>Insulele Canare</b> — Spania (Atlantic, la NV Africii)."}]}, "vecini": {"title": "Vecinătăți și granițe", "sections": [{"h": "Oceane și mări de frontieră", "p": "<b>La vest și nord-vest:</b> <b>Oceanul Atlantic</b> — influențează decisiv clima prin Curentul Atlantic de Nord (Gulf Stream). <b>La nord:</b> <b>Oceanul Arctic</b> (Marea Barents, Marea Albă, Marea Norvegiei). <b>La sud:</b> <b>Marea Mediterană</b> — conectată cu Atlanticul prin <b>Strâmtoarea Gibraltar</b> (14 km lățime). <b>La sud-est:</b> <b>Marea Neagră</b> — conectată cu Mediterana prin Bosfor → Marea Marmara → Dardanele. <b>La est:</b> <b>Marea Caspică</b> (lac endoreic, granița cu Asia) și [Munții Urali]."}, {"h": "Granița cu Asia", "p": "Granița convențională Europa-Asia urmează: <b>[Munții Urali]</b> → <b>Râul Ural</b> → <b>Marea Caspică</b> → <b>[Munții Caucaz]</b> (inclusiv Vf. Elbrus 5642 m) → <b>Marea Neagră</b> → <b>Strâmtoarea Bosfor</b> → <b>Marea Marmara</b> → <b>Strâmtoarea Dardanele</b>. Această graniță este <b>convențională, nu naturală</b>."}, {"h": "Poziția față de Africa", "p": "Europa este separată de Africa prin <b>Marea Mediterană</b>. Distanța minimă Europa-Africa: <b>~14 km</b> prin <b>Strâmtoarea Gibraltar</b> (Spania–Maroc). La nord-est, Africa și Asia sunt legate prin <b>Istmul Suez</b> (traversat de Canalul Suez, construit în 1869). Influențe africane în Europa: vântul <b>Sirocco/Leveche</b> aduce nisip saharian în Italia, Spania și Grecia."}, {"h": "Peninsulele principale", "p": "<b>Scandinavă</b> (Norvegia + Suedia) — cea mai mare (~800.000 km²). <b>Iberică</b> (Spania + Portugalia) — ~582.000 km²; delimitată de [Munții Pirinei], Atlantic și Mediterana. <b>Italică</b> (Italia) — ~131.000 km²; în formă de \"cizma\". <b>Balcanică</b> (Serbia, Bulgaria, Grecia, Albania etc.) — ~550.000 km²; la sud-est. <b>Iutlandă</b> (Danemarca) — ~39.000 km². <b>Kola</b> (Rusia) — între Marea Albă și Marea Barents. <b>Crimeea</b> (Ucraina) — în Marea Neagră."}]}, "tari": {"title": "State și populație", "sections": [{"h": "Numărul de state", "p": "Europa numără <b>~50 de state suverane</b>, din care <b>27 membre UE (2024)</b>. Cele mai extinse: <b>Rusia</b> (~3,9 mil. km² în Europa), <b>Ucraina</b> (~604.000 km²), <b>Franța</b> (~551.000 km²), <b>Spania</b> (~506.000 km²), <b>Suedia</b> (~450.000 km²). Cele mai mici: <b>Vatican</b> (0,44 km² — cel mai mic stat din lume), <b>Monaco</b> (2 km²), <b>San Marino</b> (61 km²), <b>Liechtenstein</b> (160 km²), <b>Malta</b> (316 km²)."}, {"h": "Populația", "p": "Europa are aproximativ <b>750 milioane de locuitori</b>, reprezentând ~9–10% din populația lumii. Cele mai populate: <b>Germania</b> (~84 mil.), <b>Franța</b> (~68 mil.), <b>Marea Britanie</b> (~68 mil.), <b>Italia</b> (~60 mil.), <b>Spania</b> (~47 mil.). Densitatea medie: <b>~72 loc/km²</b>. Cele mai dense zone: Benelux, NV Germaniei (coridorul Rin-Ruhr)."}, {"h": "Integrare europeană", "p": "<b>Uniunea Europeană (UE)</b> — fondată în 1993 (Tratatul de la Maastricht). Moneda comună: <b>Euro (€)</b> — 20 state (zona euro). Spațiul <b>Schengen</b> — 27 state cu liberă circulație. <b>NATO</b> — sediul la Bruxelles; 32 state membre (2024). <b>Consiliul Europei</b> — 46 state; a creat <b>Curtea Europeană a Drepturilor Omului (CEDO)</b> cu sediul la Strasbourg."}]}, "insule": {"title": "Insule și Peninsule", "sections": [{"h": "Insulele Britanice (Arhipelag)", "p": "<b>Localizare:</b> Oceanul Atlantic, nord-vestul Europei. <b>Componente principale:</b> <b>Marea Britanie</b> (~209.331 km²) — cea mai mare insulă a Europei; cuprinde Anglia, Scoția și Țara Galilor; <b>Irlanda</b> (~84.421 km²) — vest; <b>Hebridelele</b>, <b>Orkney</b>, <b>Shetland</b> — insule mai mici la nord. <b>Aparțin:</b> Regatul Unit (Marea Britanie + Irlanda de Nord) și Republica Irlanda. <b>Relief:</b> muntos în nord și vest (Munții Penini, Munții Grampiani, Munții Cambrieni — caledonici și hercinici), câmpii în sud-est. <b>Climat:</b> temperat oceanic, puternic influențat de Gulf Stream. <b>Importanță:</b> Londra — cel mai important centru financiar al Europei; Portsmouth, Southampton — porturi majore."}, {"h": "Islanda (Insulă vulcanică)", "p": "<b>Localizare:</b> Oceanul Atlantic de Nord, aproape de Cercul Polar Arctic (64°–66° N). <b>Suprafață:</b> ~103.000 km². <b>Aparține:</b> Islandei (stat independent). <b>Origine:</b> insulă de origine <b>vulcanică</b>, situată pe Dorsala Medio-Atlantică. <b>Relief:</b> platouri vulcanice, ghețari (Vatnajökull — cel mai mare ghețar din Europa, ~8.100 km²), fiorduri pe coaste. <b>Vulcani activi:</b> <b>Hekla</b>, Eyjafjallajökull (erupție 2010), Katla. <b>Geotermalism:</b> energia geotermală asigură ~90% din încălzirea rezidențială. <b>Importanță pentru bac:</b> vulcanism activ, energie geotermală, ghețar continental actual."}, {"h": "Insulele Baleare (Arhipelag mediteranean)", "p": "<b>Localizare:</b> Marea Mediterană de Vest, la est de Spania. <b>Componente:</b> <b>Mallorca</b> (cea mai mare — 3.640 km²), <b>Menorca</b>, <b>Ibiza</b>, <b>Formentera</b> și insule mici. <b>Aparțin:</b> Spaniei (comunitate autonomă). <b>Relief:</b> muntos în Mallorca (Sierra de Tramuntana — UNESCO), câmpii în centru. <b>Climat:</b> mediteranean — veri calde și uscate, ierni blânde. <b>Importanță:</b> unul dintre cele mai importante centre turistice europene (turism balnear mediteranean)."}, {"h": "Sicilia (Insulă mediteraneană)", "p": "<b>Localizare:</b> Marea Mediterană centrală, la sud-vest de peninsular Italică; separată de continent prin <b>Strâmtoarea Messina</b> (3 km). <b>Suprafață:</b> ~25.711 km² — cea mai mare insulă mediteraneană. <b>Aparține:</b> Italiei (regiune autonomă). <b>Relief:</b> muntos (Munții Nebrodi, Peloritani). <b>Vulcanism activ:</b> <b>Etna</b> (3.340 m — cel mai înalt vulcan activ din Europa). <b>Climat:</b> mediteranean. <b>Importanță pentru bac:</b> vulcanism activ (Etna), poziție strategică în Mediterana."}, {"h": "Sardinia (Insulă mediteraneană)", "p": "<b>Localizare:</b> Marea Mediterană de Vest, la vest de Peninsula Italică. <b>Suprafață:</b> ~24.090 km² — a doua insulă mediteraneană ca mărime. <b>Aparține:</b> Italiei (regiune autonomă). <b>Relief:</b> muntos-podișos (Gennargentu — 1834 m). <b>Climat:</b> mediteranean. <b>Particularitate:</b> populație cu longevitate excepțională (zonă albastră — Blue Zone)."}, {"h": "Corsica (Insulă mediteraneană)", "p": "<b>Localizare:</b> Marea Mediterană de Vest, la nord de Sardinia. <b>Suprafață:</b> ~8.680 km². <b>Aparține:</b> Franței (colectivitate cu statut special). <b>Relief:</b> montan înalt (Monte Cinto — 2.706 m), peisaj sălbatic. <b>Climat:</b> mediteranean montan. <b>Particularitate:</b> locul nașterii lui Napoleon Bonaparte."}, {"h": "Creta (Insulă grecească)", "p": "<b>Localizare:</b> Marea Mediterană de Est (Marea Cretei), la sud de Grecia continentală. <b>Suprafață:</b> ~8.336 km² — cea mai mare insulă grecească. <b>Aparține:</b> Greciei. <b>Relief:</b> muntos (Munții Ida — 2.456 m, Munții Lefka Ori). <b>Climat:</b> mediteranean, cel mai cald din Grecia. <b>Importanță:</b> turism balnear și cultural (civilizația minoică); poziție strategică în Mediterana de Est."}, {"h": "Insulele Canare (Arhipelag atlantic)", "p": "<b>Localizare:</b> Oceanul Atlantic, la ~100 km vest de coasta Africii (Maroc/Sahara Occidentală). Latitudine tropicală (~28° N). <b>Componente principale:</b> <b>Tenerife</b> (cu Pico del Teide — 3.718 m, cel mai înalt vârf din Spania), <b>Gran Canaria</b>, <b>Fuerteventura</b>, <b>Lanzarote</b>, <b>La Palma</b>, <b>La Gomera</b>, <b>El Hierro</b>. <b>Aparțin:</b> Spaniei (comunitate autonomă). <b>Origine:</b> vulcanică. <b>Climat:</b> subtropical-oceanic. <b>Importanță:</b> turism de masă tot anul; punct strategic Atlantic."}, {"h": "Insulele Azore (Arhipelag atlantic)", "p": "<b>Localizare:</b> Oceanul Atlantic, la ~1.500 km vest de Portugalia (38° N). <b>Componente:</b> 9 insule principale — <b>São Miguel</b> (cea mai mare), <b>Terceira</b>, <b>Faial</b>, <b>Pico</b> (cu cel mai înalt vârf din Portugalia — 2.351 m). <b>Aparțin:</b> Portugaliei (regiune autonomă). <b>Origine:</b> vulcanică, pe Dorsala Medio-Atlantică. <b>Climat:</b> oceanic subtropical. <b>Importanță:</b> punct de escală Atlantic; biodiversitate marină."}, {"h": "Cipru (Insulă mediteraneană)", "p": "<b>Localizare:</b> Marea Mediterană de Est, la ~70 km sud de Turcia. <b>Suprafață:</b> ~9.251 km² — a treia insulă mediteraneană ca mărime. <b>Aparține:</b> Republicii Cipru (stat independent, membru UE); nordul este ocupat de Turcia (Republica Turcă a Ciprului de Nord — nerecunoscută internațional). <b>Relief:</b> muntos (Munții Troodos — 1.952 m, roci ofilitice). <b>Climat:</b> mediteranean, cel mai cald din UE."}, {"h": "Insulele Eoliene și alte insule italiene", "p": "<b>Insulele Eoliene (Lipari):</b> Arhipelag vulcanic în Marea Tireniană, la nord de Sicilia. Aparțin Italiei. Include <b>Stromboli</b> (vulcan activ permanent — erupții la câteva ore) și <b>Vulcano</b> (vulcan activ). UNESCO. <b>Insulele Egadi:</b> Sicilia (Italia), Marea Mediterană. <b>Insula Elba:</b> Marea Tireniană (Italia) — locul primului exil al lui Napoleon. <b>Capri:</b> Golful Napoli (Italia) — turism de lux. <b>Insulele Pontine:</b> Marea Tireniană (Italia)."}, {"h": "Insulele Feroe, Spitsbergen și alte insule nordice", "p": "<b>Insulele Feroe:</b> Arhipelag în Atlantic, între Norvegia, Islanda și Scoția. <b>Aparțin:</b> Danemarcei (teritoriu autonom). Relief vulcanic, climat subpolar oceanic; pescuit. <b>Spitsbergen (Svalbard):</b> Arhipelag în Oceanul Arctic (78° N). <b>Aparține:</b> Norvegiei. Ghețari, urși polari, cercetare arctică. <b>Insulele Aland:</b> Finlanda (Marea Baltică) — demilitarizate prin tratat internațional. <b>Gotland și Öland:</b> Suedia (Marea Baltică) — insule cu patrimoniu UNESCO. <b>Insula Rügen:</b> Germania (Marea Baltică) — faleze de calcar alb."}, {"h": "Peninsula Scandinavă", "p": "<b>Localizare:</b> nordul Europei. <b>Suprafață:</b> ~800.000 km² — cea mai mare peninsulă europeană. <b>Cuprinde:</b> <b>Norvegia</b> și <b>Suedia</b>. <b>Delimitare:</b> Marea Nordului și Oceanul Atlantic (vest), Marea Norvegiei (nord-vest), Marea Barents (nord), Marea Baltică și Golful Botniei (est). <b>Relief:</b> muntos în vest ([Munții Scandinaviei] — caledonici, max 2469 m / Galdhøpiggen), podiș și câmpii în est. <b>Coastă:</b> fjorduri spectaculoase pe latura vestică (Norvegia). <b>Climă:</b> subpolară și temperată rece în interior, oceanică pe coastă."}, {"h": "Peninsula Iberică", "p": "<b>Localizare:</b> sud-vestul Europei. <b>Suprafață:</b> ~582.000 km² — a doua peninsulă europeană ca mărime. <b>Cuprinde:</b> <b>Spania</b> și <b>Portugalia</b> (și micul stat Andorra). <b>Delimitare:</b> [Munții Pirinei] (nord-est — granița cu Franța), Oceanul Atlantic (vest și nord-vest), Marea Mediterană (est și sud-est), Strâmtoarea Gibraltar (sud — ~14 km față de Africa). <b>Relief dominant:</b> [Podișul Meseta] (60% din suprafață, 600–1000 m), [Munții Pirinei] (max Vf. Maladeta 3404 m), [Munții Sierra Nevada] (max Vf. Mulhacen 3478 m), Munții Cantabrici, [Munții Iberic]. <b>Fluvii:</b> [Tajo] (cel mai lung — 1038 km), [Ebro], Duero, Guadalquivir."}, {"h": "Peninsula Italică", "p": "<b>Localizare:</b> sudul Europei, in Marea Mediterană centrală, orientată NV-SE. <b>Suprafață:</b> ~131.000 km². <b>Cuprinde:</b> <b>Italia</b> (plus statele mici San Marino și Vatican). <b>Delimitare:</b> [Munții Alpi] (nord — granița naturală cu Europa continentală), Marea Ligurică și Tireniană (vest), Marea Adriatică (est), Marea Ionică (sud). <b>Formă:</b> alungita NV-SE, numită popular <b>\"cizma\"</b>. <b>Relief dominant:</b> [Munții Apenini] (coloana vertebrală — 1300 km lungime, max Gran Sasso 2914 m), [Câmpia Padului] (nord), vulcani activi Etna și Vezuviu. <b>Coastă:</b> dalmatică la est, cu plaje la sud."}, {"h": "Peninsula Balcanică", "p": "<b>Localizare:</b> sud-estul Europei. <b>Suprafață:</b> ~550.000 km². <b>Cuprinde:</b> <b>Slovenia, Croația, Bosnia-Herțegovina, Serbia, Muntenegru, Albania, Macedonia de Nord, Bulgaria, Grecia</b>, și parțial România, Turcia europeană. <b>Delimitare:</b> Marea Adriatică (vest), Marea Ionică și Egee (sud), Marea Neagră (est), Dunărea și Sava (nord — limita convențională). <b>Relief:</b> [Munții Dinarici] (vest — calcare, carst), [Munții Balcani] / Stara Planina (centru — Bulgaria), [Munții Rodopi] și [Munții Rila] (Bulgaria — Vf. Musala 2925 m, cel mai înalt din Balcani), [Munții Pindului] (Grecia). <b>Coastă:</b> dalmatică (vest — Croația), cu insule în Marea Egee (Grecia — 2000+ insule)."}, {"h": "Peninsula Iutlandă și alte peninsule nordice", "p": "<b>Peninsula Iutlandă:</b> Nord-vest Europa. Suprafață ~39.000 km². Cuprinde <b>Danemarca</b> (și sudul Schleswig-Holstein, Germania). Delimitare: Marea Nordului (vest), Kattegat și Øresund (est), Germania (sud). Relief jos (câmpie glaciară — sub 200 m). Coastă cu dune și lagune la vest, fiorduri scurte la est. <b>Peninsula Kola:</b> Rusia, nordul extrem. Între Marea Barents (nord) și Marea Albă (sud). Climat subpolar. Bogăție minerală (nichel, apatit — Murmansk). <b>Peninsula Crimeea:</b> Ucraina, Marea Neagră. ~27.000 km². Relief: câmpie la nord, munți la sud (Munții Crimeei — 1545 m). Climat mediteranean în sud. Statut politic disputat (anexat de Rusia în 2014, nerecunoscut internațional)."}]}}}, "costier": {"label": "🏖 Relief costier", "tabs": {"tipuri": {"title": "Tipuri de țărm", "sections": [{"h": "1. Țărm cu fjorduri (relief ÎNALT)", "p": "<b>Definiție:</b> Văi glaciare adânci, săpate de ghețari cuaternari și inundate ulterior de mare. Pereți stâncoși abrupți, adâncimi mari (sute de metri), lungimi de zeci–sute de km. <b>Caractere:</b> țărm <b>înalt, stâncos, profund decupat</b>; intrații marine lungi și înguste. <b>Localizare:</b> <b>Norvegia</b> (Sognefjord — 204 km lungime, cel mai lung din lume; Hardangerfjord; Geirangerfjord — UNESCO), vestul <b>Scoției</b>, <b>Islanda</b>. <b>Importanță:</b> turism excepțional, pescuit, navigație."}, {"h": "2. Țărm cu rias (relief ÎNALT)", "p": "<b>Definiție:</b> Văi fluviale adânci (nu glaciare), orientate perpendicular pe coastă, inundate de mare prin ridicarea nivelului marin. Mai puțin adânci decât fjordurile. <b>Caractere:</b> țărm <b>înalt, stâncos</b>, coasta foarte dantelată; guri de râu evazate. <b>Localizare:</b> <b>NV Spaniei</b> (Galicia — Ria de Vigo, Ria de Arousa), <b>NV Franței</b> (Bretania), sud-vestul <b>Marii Britanii</b> (Cornwall). <b>Etimologie:</b> ria = gura de râu (spaniolă)."}, {"h": "3. Țărm dalmatic (relief ÎNALT)", "p": "<b>Definiție:</b> Lanțuri muntoase <b>paralele cu linia țărmului</b>, parțial submerse; creastele formează insule și peninsule alungite paralele cu coasta. <b>Caractere:</b> coaste <b>înalte, stâncoase</b>; insule alungite paralele cu coasta; canale înguste între insule. <b>Localizare:</b> <b>Croația</b> (Dalmația, Marea Adriatică — insule: Hvar, Brac, Korcula), <b>Muntenegru</b>, parțial <b>Albania</b>. <b>Importanță:</b> turism nautic și balnear."}, {"h": "4. Țărm cu lagune (relief JOS)", "p": "<b>Definiție:</b> Suprafețe de apă mică (salmastră sau sărată), separate de mare printr-un <b>cordon litoral</b> (grinduri de nisip sau pietriș). Origine marină. <b>Caractere:</b> coaste <b>joase, nisipoase</b>; ape puțin adânci. <b>Localizare:</b> <b>Laguna Veneției</b> (Italia — Veneția este construită pe 118 insule în interiorul lagunei), <b>Laguna Curlandiană</b> (Lituania/Rusia — Marea Baltică), <b>Laguna Vistulei</b> (Polonia). <b>România:</b> Complexul lagunar Razim-Sinoie (lângă Delta Dunării)."}, {"h": "5. Țărm cu limane (relief JOS)", "p": "<b>Definiție:</b> Guri de râu sau văi joase inundate de mare și separate de aceasta printr-un <b>cordon litoral nisipos</b>. Apă salmastră. Se formează la mări cu maree slabe. <b>Caractere:</b> coaste <b>joase</b>; ape puțin adânci; salmastru. <b>Localizare:</b> <b>NV Mării Negre</b> — limanele <b>Niprului</b> (Liman Nipro-Bug), <b>Nistrului</b>, <b>Niemenului</b>. <b>România:</b> limanele de pe litoralul românesc (Razim, Sinoie); limane fluviatile în Câmpia Română."}, {"h": "6. Țărm cu delte (relief JOS)", "p": "<b>Definiție:</b> Relief de <b>acumulare</b> la gura unui fluviu, creat prin depunerea aluviunilor. Se formează în mări cu maree slabe. <b>Caractere:</b> coaste <b>extrem de joase</b>, mlăștinoase; pământ în continuă creștere; brațe multiple; biodiversitate mare. <b>Localizare:</b> <b>Delta Dunării</b> (UNESCO, ~5800 km²), Delta <b>Volgăi</b> (Caspica), Delta <b>Po/Pad</b> (Adriatică, Italia), Delta <b>Rinului</b> (Marea Nordului, Olanda), Delta <b>Rhônului</b> — Camargue (Mediterana, Franța), Delta <b>Ebrului</b> (Mediterana, Spania). <b>Nu se formează delte</b> acolo unde mareele sunt puternice (Tamisa, Elba, Sena → estuare)."}, {"h": "7. Țărm cu estuare (relief JOS)", "p": "<b>Definiție:</b> Guri de fluviu <b>evazate în formă de pâlnie</b>, modelate prin acțiunea mareelor. Se formează unde mareele sunt puternice și fluviul nu poate acumula aluviuni. <b>Caractere:</b> coaste <b>joase</b>; lărgire spre mare; apă salmastră; porturi naturale excelente. <b>Localizare:</b> <b>Estuarul Tamisei</b> (Londra), <b>Estuarul Elbei</b> (Hamburg), <b>Estuarul Senei</b> (Le Havre), <b>Estuarul Garonei</b> (Gironde — Bordeaux), <b>Estuarul Tajo</b> (Lisabona)."}, {"h": "8. Țărm cu plaje și dune de nisip (relief JOS)", "p": "<b>Definiție:</b> Coaste joase nisipoase formate prin acumularea materialelor fine marine sau fluviatile. Dunele = nisip uscat transportat de vânt. <b>Caractere:</b> coaste <b>joase, nisipoase</b>; plaje largi; posibil dune în spatele plajei. <b>Localizare:</b> <b>Litoralul Mării Baltice</b> (Polonia, Germania, Letonia, Estonia), <b>Litoralul Mării Nordului</b> (Olanda, Belgia, Danemarca), <b>Golful Biscaya</b> — SW Franței (<b>Duna de la Arcachon</b> — 110 m, cea mai înaltă din Europa), <b>Litoralul Mării Negre</b> (România — Mamaia, Bulgaria — Nisipurile de Aur)."}, {"h": "9. Țărm cu faleze (relief ÎNALT)", "p": "<b>Definiție:</b> Abrupturi stâncoase formate prin <b>eroziunea valurilor marine</b> la baza versanților. Falezia retrocedează treptat spre continent. <b>Caractere:</b> coaste <b>înalte, abrupte, stâncoase</b>; linie de coastă relativ dreaptă. <b>Localizare:</b> <b>Normandia</b> (Franța — Falezele de alabastru, Etretat — calcar alb), <b>Dover</b> (White Cliffs of Dover, Marea Britanie), <b>Algarve</b> (Portugalia), coasta <b>Croației</b>, <b>Capul Caliacra</b> (Bulgaria, Marea Neagră)."}]}, "definitii": {"title": "Definiții geografice", "sections": [{"h": "Liman", "p": "<b>Definiție:</b> Porțiune dintr-o fostă vale sau gura unui râu, inundată de mare și separată de aceasta printr-un <b>cordon litoral</b> (grind nisipos). Apa este <b>salmastră</b> sau dulce. <b>Tipuri:</b> <b>liman maritim</b> (comunicare cu marea — ex. limanele Niprului, Nistrului) și <b>liman fluviatil</b> (fără contact cu marea, pe un râu — ex. Lacul Snagov, România). <b>Condiție de formare:</b> mare cu maree slabe (Marea Neagră). <b>Exemple europene:</b> Liman Nipro-Bug (Ucraina), Nimenul (Lituania), Sinoie și Razim (România)."}, {"h": "Lagunã", "p": "<b>Definiție:</b> Suprafață de apă marină sau salmastră, parțial sau complet <b>separată de mare printr-un cordon litoral</b> (grind, bară de nisip). Spre deosebire de liman (origine fluviatilă), laguna este de origine pur marină. <b>Caractere:</b> apă puțin adâncă, salmastră; ecosistem fragil. <b>Exemple europene:</b> <b>Laguna Veneției</b> (Italia, Adriatică — Veneția pe 118 insule), <b>Laguna Curlandiană</b> (Lituania/Rusia, Baltică), <b>Razim-Sinoie</b> (România, Marea Neagră)."}, {"h": "Estuar", "p": "<b>Definiție:</b> Gura unui fluviu <b>evazată în formă de pâlnie</b>, puternic influențată de <b>maree</b>. Se formează acolo unde forța mareelor împiedică acumularea aluviunilor. <b>Diferență față de deltă:</b> aluviunile sunt evacuate în larg (nu se acumulează). <b>Caractere:</b> apă salmastră; lărgire spre mare; navigabil; porturi importante. <b>Exemple:</b> Estuarul <b>Tamisei</b> (Londra), <b>Elbei</b> (Hamburg), <b>Senei</b> (Le Havre), <b>Garonei</b> (Bordeaux), <b>Tajo</b> (Lisabona)."}, {"h": "Deltã", "p": "<b>Definiție:</b> Formă de relief de <b>acumulare</b> la gura unui fluviu, creată prin depunerea aluviunilor. Numele vine de la litera greceasca Delta (Δ) — forma triunghiulară. <b>Condiții de formare:</b> mare cu maree slabe, debit aluvionar mare, câmpie litorală joasă. <b>Structură:</b> brațe multiple, bălți, grinduri, ostroave. <b>Exemple europene:</b> <b>Delta Dunării</b> (UNESCO, ~5800 km²), Delta <b>Volgăi</b>, Delta <b>Po</b>, Delta <b>Rinului</b>, Delta <b>Rhônului</b> (Camargue), Delta <b>Ebrului</b>."}, {"h": "Golf", "p": "<b>Definiție:</b> Porțiune de mare sau ocean care <b>pătrunde în uscat</b>, mai largă decât adâncă (spre deosebire de fiord). Coastă concavă, deschidere largă. <b>Exemple europene:</b> <b>Golful Biscaya</b> (Atlantic, Spania-Franța — maree puternice), <b>Golful Finlandei</b> (Baltică — Helsinki, Sankt Petersburg), <b>Golful Botniei</b> (Baltică — Suedia/Finlanda), <b>Golful Veneției</b> (Adriatică), <b>Golful Leului</b> (Mediterana, Franța), <b>Golful Taranto</b> (Italia, Ionica)."}, {"h": "Strâmtoare", "p": "<b>Definiție:</b> Porțiune îngustă de apă care <b>leagă două bazine marine</b> sau separă o insulă de continent. <b>Exemple europene esențiale:</b> <b>Gibraltar</b> (14 km — Atlantic ↔ Mediterana, Spania-Maroc), <b>Bosfor</b> (0,7 km — Marea Neagră ↔ Marea Marmara, Istanbul), <b>Dardanele</b> (1,3 km — Marmara ↔ Egee), <b>Kerci</b> (Neagră ↔ Azov), <b>Øresund</b> (Marea Nordului ↔ Baltică), <b>Pas de Calais</b> (33 km — Marea Nordului ↔ Mânecii; sub el trece Eurotunel)."}, {"h": "Cap geografic", "p": "<b>Definiție:</b> Proeminență de uscat care <b>înaintează în mare</b>. Mai îngustă decât o peninsulă. <b>Exemple europene:</b> <b>Capul Nord / Nordkapp</b> (Norvegia — extremul nordic, 71°10'N), <b>Capul Roca</b> (Portugalia — extremul vestic, 9°30'V), <b>Capul Tarifa</b> (Spania — extremul sudic, 35°59'N), <b>Capul Matapan</b> (Grecia — extremul sudic al Balcanilor), <b>Capul Finisterre</b> (Spania — capătul pamântului în latină)."}, {"h": "Fiord (Fjord)", "p": "<b>Definiție:</b> Vale glaciară adâncă, <b>inundată de mare</b>, cu pereți stâncoși aproape verticali. Un tip special de golf îngust și adânc, de origine glaciară. <b>Caractere:</b> adâncimi sute de metri, pereți înalți, lungimi zeci–sute de km, apă sărată rece. <b>Exemple:</b> <b>Sognefjord</b> (Norvegia — 204 km lungime, 1308 m adâncime — cel mai lung și adânc din lume), <b>Hardangerfjord</b> (179 km), <b>Geirangerfjord</b> (UNESCO)."}, {"h": "Peninsulă și Arhipelag", "p": "<b>Peninsulă:</b> porțiune de uscat înconjurată de apă pe trei laturi, legată de continent printr-un istm. <b>Arhipelag:</b> grup de insule aflate în apropierea unele de altele. <b>Exemple arhipelaguri europene:</b> <b>Arhipelagul Britanic</b> (Marea Britanie + Irlanda + insule mici), <b>Insulele Baleare</b> (Spania), <b>Insulele Canare</b> (Spania, Atlantic), <b>Insulele Eoliene</b> (Italia — cu Stromboli), <b>Insulele Azore</b> (Portugalia, Atlantic), <b>Insulele Feroe</b> (Danemarca)."}]}, "maree": {"title": "Maree și influențe", "sections": [{"h": "Ce sunt mareele", "p": "<b>Mareele</b> sunt oscilații ritmice ale nivelului mărilor și oceanelor, cauzate de <b>atracția gravitațională a Lunii și Soarelui</b>. Ciclul tipic: <b>două flux</b> (maree plină) și <b>două reflux</b> (maree joasă) în ~24 ore. <b>Flux</b> = creșterea nivelului mării; <b>reflux</b> = scăderea nivelului. <b>Amplitudinea mareei</b> = diferența de nivel între flux maxim și reflux minim."}, {"h": "Unde mareele sunt puternice în Europa", "p": "<b>Oceanul Atlantic</b> — maree puternice: <b>Golful Biscaya</b> — 4–5 m amplitudine; <b>Pas de Calais / Canalul Mânecii</b> — 5–8 m (Saint-Malo, Franța — cel mai mare din Europa); <b>Marea Nordului</b> — 3–4 m (Olanda, Germania — polderele sunt consecința mareelor!). Estuarele <b>Tamisei, Garonei, Senei, Elbei</b> sunt modelate de maree. <b>Consecință cheie:</b> maree puternice → estuare (nu delte), plaje dinamice. <b>La Saint-Malo</b> se află <b>prima centrală mareamotrice din lume</b> (La Rance, 1966)."}, {"h": "Unde mareele sunt slabe sau absente", "p": "<b>Marea Mediterană</b> — maree aproape inexistente (<b>0,2–0,5 m</b>); bazin aproape închis → fluviile formează <b>delte</b> (Rhône, Po, Ebru). <b>Marea Neagră</b> — maree extrem de slabe (<b>sub 0,1 m</b>) → <b>Dunărea formează deltă</b>. <b>Marea Baltică</b> — maree mici (0,1–0,3 m) → coastă cu lagune și limane. <b>Regula generală pentru bac:</b> mări închise/semi-închise = maree slabe = <b>DELTE</b>; oceane deschise = maree puternice = <b>ESTUARE</b>."}, {"h": "Influența mareelor asupra reliefului costier", "p": "<b>Maree puternice → estuare:</b> aluviunile evacuate în larg, gura fluviului modelată în pâlnie (Tamisa, Elba, Sena, Garona, Tajo). <b>Maree slabe → delte:</b> aluviunile acumulate la gură, pământ crește spre mare (Dunărea, Volga, Rhône, Po, Ebru). <b>Faleze:</b> eroziunea valurilor + maree = abrupturi stâncoase pe coaste înalte (Normandia, Dover). <b>Plaje și dune:</b> nisipul uscat la reflux e transportat de vânt → dune (Arcachon — 110 m). <b>Poldere (Olanda):</b> terenuri câștigate de la mare prin diguri în zone cu maree — 1/3 din Olanda e sub nivelul mării."}]}}}};;

// ===================== MAP INIT =====================
let viewMode = 'natural';
let activeOverlay = null; // 'clima'|'biop'|'res'
let cliMode = 'tari';
let bioMode = 'tari';
let resMode = 'tari'; // tari or sym
let activeCatFilter = '';

// Leaflet layers
let lRelief = null, lCountries = null, lRivers = null, lCaps = null, lPeaks = null;
let lClimaOverlay = null, lBiopOverlay = null, lResOverlay = null, lResSymbols = null;
let lLakes = null;
let lRiverHighlight = null;
let hidrMode = 'rauri';
const reliefByName = {};

const map = L.map('map', {
  center: [52, 15],
  zoom: 4,
  zoomControl: true,
  minZoom: 3,
  maxZoom: 12
});

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17,
  attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> | Stil: © <a href="https://opentopomap.org">OpenTopoMap</a> (CC-BY-SA)'
}).addTo(map);

// Color helpers
function hexDarken(hex, pct) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.round(r*(1-pct)); g=Math.round(g*(1-pct)); b=Math.round(b*(1-pct));
  return 'rgb('+r+','+g+','+b+')';
}

// Categories hidden when no specific filter is active (visually overlap with structural relief)
const HIDDEN_BY_DEFAULT = ['peninsula'];

function getReliefStyle(cat, dimmed, hidden) {
  var cols = viewMode==='natural' ? TYPE_COLORS_NAT : TYPE_COLORS_CAT;
  var fill = cols[cat] || '#ccc';
  return {
    fillColor: fill,
    fillOpacity: hidden ? 0 : (dimmed ? 0.12 : 0.62),
    color: hexDarken(fill.replace('#','').length===6 ? fill : '#8b6f47', 0.35),
    weight: hidden ? 0 : (dimmed ? 0.4 : 0.8),
    opacity: hidden ? 0 : (dimmed ? 0.3 : 0.85)
  };
}

// Load GeoJSON
fetch('europa_vector.geojson')
  .then(function(r){
    if(!r.ok) throw new Error('Fișierul europa_vector.geojson nu a fost găsit pe server (HTTP '+r.status+'). Deployează-l alături de europa.html.');
    return r.json();
  })
  .then(function(geo){
    var countryF = geo.features.filter(function(f){ return f.properties.layer==='country'; });
    var reliefF  = geo.features.filter(function(f){ return f.properties.layer==='relief'; });
    var riverF   = geo.features.filter(function(f){ return f.properties.layer==='river'; });

    // Country outlines
    lCountries = L.geoJSON(countryF, {
      style: { color:'rgba(60,40,20,0.55)', weight:0.5, fillOpacity:0, fillColor:'transparent' },
      onEachFeature: function(f, layer) {
        var n = f.properties.name || '';
        layer.bindTooltip(n, {sticky:true, className:'custom-tooltip', direction:'top'});
        layer.on('click', function() { onCountryClick(f, layer); });
      }
    }).addTo(map);

    // Relief polygons
    lRelief = L.geoJSON(reliefF, {
      style: function(f){ return getReliefStyle(f.properties.cat, false); },
      onEachFeature: function(f, layer) {
        var p = f.properties;
        var catLabel = TYPE_NAMES[p.cat] || p.cat || '';
        var catColor = (viewMode==='natural'?TYPE_COLORS_NAT:TYPE_COLORS_CAT)[p.cat] || '#888';
        layer.bindTooltip(
          '<b>'+p.name+'</b><br><span style="font-size:10px;color:#5a4a3a">'+catLabel+'</span>',
          {sticky:true, className:'custom-tooltip', direction:'top'}
        );
        layer.bindPopup(
          '<b>'+p.name+'</b>'+(p.name_en && p.name_en!==p.name ? '<br><span style="color:#7a6a5a;font-size:11px">'+p.name_en+'</span>' : '')+
          '<br><span class="tip-cat" style="background:'+catColor+'">'+catLabel+'</span>'+
          (p.info ? '<br><small>'+p.info+'</small>' : ''),
          {maxWidth:260}
        );
        layer.on('mouseover', function(){ if(!activeOverlay) this.bringToFront(); });
        layer.on('click', function(){ layer.openPopup(); });
        if(p.name) reliefByName[p.name] = layer;
      }
    }).addTo(map);

    // Rivers from geojson
    lRivers = L.geoJSON(riverF, {
      style: { color:'#4a7aaa', weight:1.8, opacity:0.75 },
      onEachFeature: function(f, layer) {
        var n = f.properties.name || '';
        var info = RIVERS[n] ? RIVERS[n].info : '';
        layer.bindTooltip('<b>'+n+'</b>', {sticky:true, className:'custom-tooltip', direction:'top'});
        if(info) layer.bindPopup('<b>'+n+'</b><br><small>'+info+'</small>', {maxWidth:260});
      }
    });
    // Rivers hidden by default, toggle with button
    // lRivers.addTo(map); // shown by default - add it
    lRivers.addTo(map);

    // Capitals
    buildCaps();
    buildPeaks();
    buildLegend();
    buildMaterie();
    buildCapList('');
    buildResLegend();
    filterRelief('');  // apply default visibility (hide peninsulas)
  })
  .catch(function(err){
    console.error('GeoJSON load error:', err);
    var msg = document.createElement('div');
    msg.style.cssText = 'position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:9999;background:#c0392b;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-family:sans-serif;max-width:320px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.5)';
    msg.textContent = '⚠ europa_vector.geojson lipseste de pe server. Deployeàaza fisierul alaturi de europa.html.';
    document.body.appendChild(msg);
  });

// ===================== CAPS =====================
function buildCaps() {
  lCaps = L.layerGroup();
  CAPITALS.forEach(function(c) {
    var name=c[0], country=c[1], lng=c[2], lat=c[3];
    var isRO = name==='București';
    var dotColor = isRO ? '#e8a84c' : '#fff';
    var icon = L.divIcon({
      className: '',
      html: '<div class="cap-marker-inner"><div class="cap-dot" style="background:'+dotColor+';border-color:#1a1a1a;box-shadow:0 0 0 1.5px '+dotColor+',0 2px 5px rgba(0,0,0,.7)"></div><div class="cap-label" style="border-color:'+dotColor+'">'+name+'</div></div>',
      iconSize:[10,10], iconAnchor:[5,5]
    });
    var mk = L.marker([lat,lng], {icon:icon, zIndexOffset:1000});
    mk.bindPopup('<b>'+name+'</b><br><span style="color:#666">Capitala '+country+'</span>');
    lCaps.addLayer(mk);
  });
  lCaps.addTo(map);
}

// ===================== PEAKS =====================
function buildPeaks() {
  lPeaks = L.layerGroup();
  PEAKS.forEach(function(p) {
    var icon = L.divIcon({
      className:'',
      html:'<div class="peak-mk">▲ '+p.n+'<br><span style="font-size:8.5px;color:#7a5a3a">'+p.alt+'</span></div>',
      iconSize:[120,28], iconAnchor:[4,14]
    });
    L.marker([p.lat,p.lon], {icon:icon}).addTo(lPeaks);
  });
  lPeaks.addTo(map);
}

// ===================== LEGEND =====================
function buildLegend() {
  var el = document.getElementById('legenda');
  var cols = viewMode==='natural' ? TYPE_COLORS_NAT : TYPE_COLORS_CAT;
  el.innerHTML = '';
  Object.keys(TYPE_NAMES).forEach(function(k) {
    var div = document.createElement('div');
    div.className = 'leg-item';
    div.innerHTML = '<span class="leg-box" style="background:'+cols[k]+'"></span>'+TYPE_NAMES[k];
    div.onclick = function() {
      document.querySelectorAll('.fbtn[data-cat]').forEach(function(b){ b.classList.remove('active'); });
      var btn = document.querySelector('.fbtn[data-cat="'+k+'"]');

// ===================== FILTER =====================
function filterRelief(cat) {
  activeCatFilter = cat;
  if(!lRelief) return;
  lRelief.eachLayer(function(layer) {
    var c = layer.feature && layer.feature.properties && layer.feature.properties.cat;
    // 'none' = hide everything; '' = default (hide HIDDEN_BY_DEFAULT only); otherwise show only matching cat
    var hidden = (cat === 'none') || (!cat && HIDDEN_BY_DEFAULT.indexOf(c) !== -1);
    var show = (cat === 'none') ? false : (!cat ? !hidden : (c === cat));
    layer.setStyle(getReliefStyle(c, !show, hidden));
    var el = layer.getElement && layer.getElement();
    if(el) el.style.pointerEvents = hidden ? 'none' : '';
  });
  // If an overlay is active, force ALL relief non-interactive so clicks reach countries
  if(activeOverlay) setReliefInteractive(false);
}

function setReliefInteractive(interactive) {
  if(!lRelief) return;
  lRelief.eachLayer(function(layer){
    var el = layer.getElement && layer.getElement();
    if(!el) return;
    if(interactive) {
      // Restore based on hidden state from current filter
      var c = layer.feature && layer.feature.properties && layer.feature.properties.cat;
      var hidden = !activeCatFilter && HIDDEN_BY_DEFAULT.indexOf(c) !== -1;
      el.style.pointerEvents = hidden ? 'none' : '';
    } else {
      el.style.pointerEvents = 'none';
    }
  });
}

function resetReliefStyle() {
  filterRelief(activeCatFilter);
}

// ===================== COUNTRY CLICK =====================
// Some geojson features have iso_n3 = "-99" or missing (Natural Earth bug
// for France, Norway and others). Fall back to English name → ISO N3.
const NAME_TO_ISO_FALLBACK = {
  'france': '250',
  'french republic': '250',
  'norway': '578',
  'kingdom of norway': '578'
};
function resolveISO(props) {
  var iso = props && props.iso_n3 != null ? String(props.iso_n3) : '';
  if(iso && iso !== '-99' && iso !== '0' && iso !== '') return iso;
  var name = ((props && props.name) || '').toLowerCase().trim();
  return NAME_TO_ISO_FALLBACK[name] || iso;
}

function onCountryClick(f, layer) {
  var iso = resolveISO(f.properties);
  var name = f.properties.name || '';
  if(!activeOverlay) return;
  if(activeOverlay==='clima') {
    var d = COUNTRIES_CLIMA[iso];
    if(d) showClimaInfo(d);
  } else if(activeOverlay==='biop') {
    var d2 = BIOP_COUNTRIES[iso];
    if(d2) showBiopInfo(d2);
  } else if(activeOverlay==='res') {
    if(resMode!=='tari') return;
    var d3 = RES.tari[iso];
    if(d3) showResInfo(d3, 'tari');
  }
}

// Find bac data for a river name across all basins
function findRiverBacData(name) {
  var found = null;
  Object.keys(RIVERS_BAC).forEach(function(bz){
    RIVERS_BAC[bz].forEach(function(r){ if(r.n === name) found = r; });
  });
  return found;
}

// Highlight a river using its known coordinates from the RIVERS constant.
// This works regardless of whether the geojson contains the river,
// because we use our own pts data.
function highlightRiver(name) {
  // Clear previous highlight
  if(lRiverHighlight) { try { map.removeLayer(lRiverHighlight); } catch(e){} lRiverHighlight = null; }

  var rd = RIVERS[name];
  if(!rd || !rd.pts || !rd.pts.length) return;

  // pts are [lon, lat] pairs — convert to Leaflet [lat, lon]
  var latlngs = rd.pts.map(function(p){ return [p[1], p[0]]; });

  // Layer group: thick red highlight + white halo for visibility on any basemap
  lRiverHighlight = L.layerGroup();
  L.polyline(latlngs, {color:'#ffffff', weight:8, opacity:0.65}).addTo(lRiverHighlight);
  L.polyline(latlngs, {color:'#e04020', weight:4.5, opacity:0.95}).addTo(lRiverHighlight);
  // Endpoint markers (source = green, mouth = red)
  var src = latlngs[0], mouth = latlngs[latlngs.length-1];
  L.circleMarker(src, {radius:6, fillColor:'#2d8a3a', color:'#fff', weight:2, fillOpacity:1})
    .bindTooltip('Izvor', {permanent:false, direction:'top', className:'custom-tooltip'})
    .addTo(lRiverHighlight);
  L.circleMarker(mouth, {radius:6, fillColor:'#c0302b', color:'#fff', weight:2, fillOpacity:1})
    .bindTooltip('Vărsare', {permanent:false, direction:'top', className:'custom-tooltip'})
    .addTo(lRiverHighlight);
  lRiverHighlight.addTo(map);

  // Build popup content with bac info
  var bac = findRiverBacData(name);
  var popupHtml = '<b>'+name+'</b>';
  if(bac) {
    popupHtml += '<br><small><b>Lungime:</b> '+bac.lg+'</small>'+
      '<br><small><b>Izvor:</b> '+bac.izv+'</small>'+
      '<br><small><b>Vărsare:</b> '+bac.varsa+'</small>'+
      '<br><small style="font-style:italic;color:#3a4a5a">'+bac.note+'</small>';
  } else if(rd.info) {
    popupHtml += '<br><small>'+rd.info+'</small>';
  }

  // Compute bounds and fly there
  var bounds = L.latLngBounds(latlngs);
  try { map.flyToBounds(bounds, {duration:0.9, maxZoom:6, padding:[40,40]}); } catch(e){}

  // Open popup at the middle of the river after the fly animation
  var midIdx = Math.floor(latlngs.length/2);
  var popupPos = latlngs[midIdx];
  setTimeout(function(){
    L.popup({maxWidth:280}).setLatLng(popupPos).setContent(popupHtml).openOn(map);
  }, 950);
}
