<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Intră în cont · GeoBac</title>
<meta name="description" content="Intră în contul tău GeoBac pentru a accesa subiectele de bacalaureat.">
<meta name="theme-color" content="#0c1117">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230c1117'/%3E%3Ccircle cx='50' cy='50' r='26' fill='none' stroke='%2300d4aa' stroke-width='5'/%3E%3Cpath d='M24 50h52M50 24v52' stroke='%2300d4aa' stroke-width='3.5' opacity='.45'/%3E%3Ccircle cx='50' cy='50' r='5' fill='%23f5a623'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c1117;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --text:#e8e6e1;
  --text2:rgba(232,230,225,0.75);
  --text3:rgba(232,230,225,0.50);
  --teal:#00d4aa;
  --amber:#f5a623;
  --coral:#ff6b6b;
  --blue:#5b9cf6;
  --font:'Outfit',sans-serif;
  --body:'DM Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;line-height:1.6;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
  background:
    radial-gradient(ellipse 60% 40% at 30% 15%, rgba(0,212,170,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 70% 85%, rgba(91,156,246,0.06) 0%, transparent 55%),
    var(--bg);
}

nav{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;max-width:1200px;width:100%;margin:0 auto;}
.logo{font-family:var(--font);font-weight:800;font-size:20px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
.logo span{background:linear-gradient(135deg,var(--teal),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);}
.back{font-family:var(--font);font-size:13px;color:var(--text3);text-decoration:none;font-weight:500;transition:color 0.2s;}
.back:hover{color:var(--teal);}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.card{max-width:460px;width:100%;padding:44px 36px;border-radius:22px;background:var(--surface);border:1px solid var(--border2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}

.card-head{text-align:center;margin-bottom:32px;}
.card-icon{width:56px;height:56px;margin:0 auto 16px;border-radius:16px;background:linear-gradient(135deg,rgba(0,212,170,0.2),rgba(91,156,246,0.15));border:1px solid rgba(0,212,170,0.25);display:flex;align-items:center;justify-content:center;font-size:26px;}
.card h1{font-family:var(--font);font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
.card .sub{color:var(--text2);font-size:14px;}

.field{margin-bottom:16px;}
label{display:block;font-family:var(--font);font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;}
input{
  width:100%;padding:14px 16px;border-radius:10px;
  font-family:var(--body);font-size:15px;
  color:#ffffff;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.20);
  outline:none;transition:all 0.2s;
}
input::placeholder{color:rgba(232,230,225,0.55);font-size:14px;}
input:focus{
  border-color:var(--teal);
  background:rgba(0,0,0,0.35);
  box-shadow:0 0 0 3px rgba(0,212,170,0.12);
}

.password-wrap{position:relative;}
.password-wrap input{padding-right:44px;}
.toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0;transition:color 0.2s;}
.toggle-pw:hover{color:var(--text2);}

.forgot{display:block;text-align:right;font-size:12px;color:var(--text3);text-decoration:none;margin-top:6px;transition:color 0.2s;}
.forgot:hover{color:var(--teal);}

.msg{padding:12px 14px;border-radius:9px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px;}
.msg.show{display:flex;}
.msg.err{background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.3);color:var(--coral);}
.msg.ok{background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.3);color:var(--teal);}
.msg .ico{font-size:16px;flex-shrink:0;}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:11px;font-family:var(--font);font-weight:700;font-size:15px;color:var(--bg);background:linear-gradient(135deg,var(--teal),#00b894);text-decoration:none;transition:all 0.3s;border:none;cursor:pointer;letter-spacing:0.2px;margin-top:8px;}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,212,170,0.35);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:var(--bg);border-radius:50%;animation:spin 0.6s linear infinite;display:none;}
.btn.loading .spinner{display:block;}
.btn.loading .btn-text{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:var(--text3);font-family:var(--font);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2);}

.register-box{padding:18px;border-radius:12px;background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.18);text-align:center;}
.register-box p{color:var(--text2);font-size:13.5px;margin-bottom:12px;line-height:1.55;}
.register-box a{display:inline-flex;align-items:center;gap:6px;color:var(--amber);font-family:var(--font);font-size:14px;font-weight:700;text-decoration:none;}
.register-box a:hover{text-decoration:underline;}

.help{margin-top:20px;text-align:center;color:var(--text3);font-size:12px;line-height:1.55;}
.help a{color:var(--text2);text-decoration:none;}
.help a:hover{color:var(--teal);}

footer{text-align:center;padding:22px;font-size:12px;color:var(--text3);}

@media(max-width:520px){
  .card{padding:32px 22px;}
  .card h1{font-size:22px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span class="dot"></span>Geo<span>Bac</span></a>
  <a href="index.html" class="back">← Înapoi</a>
</nav>

<main>
  <div class="card">
    <div class="card-head">
      <div class="card-icon">🔐</div>
      <h1>Intră în cont</h1>
      <p class="sub">Accesează subiectele de bacalaureat</p>
    </div>

    <div id="msg" class="msg"></div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="adresa@email.com" autocomplete="email" required>
    </div>

    <div class="field">
      <label for="password">Parolă</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Arată parola">👁️</button>
      </div>
      <a href="forgot.html" class="forgot">Ai uitat parola?</a>
    </div>

    <button class="btn" id="loginBtn">
      <div class="spinner"></div>
      <span class="btn-text">Intră în cont →</span>
    </button>

    <div class="divider">sau</div>

    <div class="register-box">
      <p>Nu ai cont încă?<br>Cumpără acces și îți creăm contul imediat.</p>
      <a href="index.html#cumpara">Cumpără acces — 99 lei/lună →</a>
    </div>

    <div class="help">
      Probleme cu accesul?<br>
      Scrie-ne la <a href="mailto:contact@geobac.ro">contact@geobac.ro</a>
    </div>
  </div>
</main>

<footer>GeoBac · 2026</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://bxbefvelonocuheavsri.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4YmVmdmVsb25vY3VoZWF2c3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTk5MzAsImV4cCI6MjA5Mjc5NTkzMH0.lRJX8JITWrBl1Mb6IeETtwBddTEOw7FI5isa9oGsGDA';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const emailEl    = document.getElementById('email');
const passwordEl = document.getElementById('password');
const loginBtn   = document.getElementById('loginBtn');
const msgEl      = document.getElementById('msg');
const togglePw   = document.getElementById('togglePw');

(async () => {
  const { data } = await db.auth.getSession();
  if (data.session) redirectAfterLogin();
})();

togglePw.addEventListener('click', () => {
  const isText = passwordEl.type === 'text';
  passwordEl.type = isText ? 'password' : 'text';
  togglePw.textContent = isText ? '👁️' : '🙈';
});

[emailEl, passwordEl].forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });
});

function showMsg(text, type) {
  msgEl.className = 'msg show ' + type;
  msgEl.innerHTML = '<span class="ico">' + (type === 'ok' ? '✓' : '✕') + '</span>' + text;
}

function setLoading(on) {
  loginBtn.disabled = on;
  loginBtn.classList.toggle('loading', on);
}

function redirectAfterLogin() {
  const params = new URLSearchParams(location.search);
  let returnTo = params.get('return') || 'europa.html';
  const allowed = ['europa.html', 'romania.html', 'vecini.html'];
  if (!allowed.includes(returnTo)) returnTo = 'europa.html';
  location.href = returnTo;
}

loginBtn.addEventListener('click', async () => {
  const email    = emailEl.value.trim();
  const password = passwordEl.value;

  if (!email || !email.includes('@')) {
    showMsg('Introdu un email valid.', 'err'); emailEl.focus(); return;
  }
  if (!password || password.length < 6) {
    showMsg('Parola trebuie să aibă cel puțin 6 caractere.', 'err'); passwordEl.focus(); return;
  }

  setLoading(true);

  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const { data: profile } = await db
      .from('profiles').select('is_premium').eq('id', data.user.id).single();

    if (!profile || !profile.is_premium) {
      await db.auth.signOut();
      showMsg('Contul tău nu are acces premium. <a href="index.html#cumpara" style="color:var(--amber)">Cumpără acces →</a>', 'err');
      setLoading(false);
      return;
    }

    showMsg('Autentificare reușită! Te redirecționăm...', 'ok');
    setTimeout(redirectAfterLogin, 800);

  } catch (err) {
    setLoading(false);
    if (err.message.includes('Invalid login')) {
      showMsg('Email sau parolă incorectă.', 'err');
    } else if (err.message.includes('Email not confirmed')) {
      showMsg('Confirmă-ți emailul înainte să te loghezi.', 'err');
    } else {
      showMsg('Eroare: ' + err.message, 'err');
    }
  }
});
</script>
</body>
</html>
