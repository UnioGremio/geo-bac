<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exerciții BAC · Geografie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1117;--bg2:#111820;--bg3:#162030;
  --teal:#00d4aa;--teal2:#00a882;--teal-dim:rgba(0,212,170,.12);
  --gold:#f5a623;--gold-dim:rgba(245,166,35,.12);
  --red:#ff4d6d;--green:#39d98a;
  --txt:#dde5ee;--txt2:#7a9ab5;--txt3:#3a5a75;
  --card:rgba(22,32,48,.85);--border:rgba(0,212,170,.13);
  --radius:14px;--font:'Outfit',sans-serif;--serif:'Cinzel',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(0,212,170,.06) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 80%,rgba(245,166,35,.04) 0%,transparent 55%);
  pointer-events:none;z-index:0}

header{position:relative;z-index:10;text-align:center;padding:36px 20px 26px;border-bottom:1px solid var(--border)}
.hdr-sub{font-family:var(--serif);font-size:10px;letter-spacing:5px;color:var(--teal);text-transform:uppercase;margin-bottom:10px}
header h1{font-family:var(--serif);font-size:clamp(20px,4vw,34px);font-weight:700;color:#fff;letter-spacing:2px;margin-bottom:6px}
.hdr-desc{color:var(--txt2);font-size:12.5px}

.score-bar{display:flex;align-items:center;justify-content:center;gap:20px;padding:12px 20px;position:relative;z-index:10}
.score-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2)}
.score-num{font-size:18px;font-weight:700;color:var(--txt);font-family:var(--serif)}
.score-num.ok{color:var(--green)}.score-num.bad{color:var(--red)}
.score-sep{width:1px;height:28px;background:var(--border)}

.tab-nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:16px 16px 0;position:relative;z-index:10}
.tab-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;background:var(--card);border:1.5px solid var(--border);border-radius:50px;color:var(--txt2);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .22s;white-space:nowrap}
.tab-btn .ico{font-size:15px}
.tab-btn:hover{border-color:var(--teal);color:var(--txt)}
.tab-btn.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal);font-weight:600}

.section{display:none;padding:20px 16px 60px;max-width:880px;margin:0 auto;position:relative;z-index:5;animation:fadeIn .3s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.section-title{font-family:var(--serif);font-size:14px;letter-spacing:3px;color:var(--teal);text-transform:uppercase;text-align:center;margin-bottom:20px}

.chap-select{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.chap-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--txt2);font-size:11px;font-family:var(--font);cursor:pointer;transition:all .18s}
.chap-btn:hover,.chap-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}

/* GRILĂ */
.q-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:12px;transition:border-color .2s}
.q-card.correct{border-color:var(--green);background:rgba(57,217,138,.07)}
.q-card.wrong{border-color:var(--red);background:rgba(255,77,109,.07)}
.q-num{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:1px;margin-bottom:7px}
.q-text{font-size:14px;color:var(--txt);line-height:1.6;margin-bottom:14px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:520px){.opts{grid-template-columns:1fr}}
.opt{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.07);border-radius:9px;cursor:pointer;transition:all .16s;font-size:12.5px;color:var(--txt2);text-align:left}
.opt:hover{border-color:var(--teal);color:var(--txt);background:var(--teal-dim)}
.opt.selected{border-color:var(--teal);color:var(--txt);background:var(--teal-dim)}
.opt.correct-ans{border-color:var(--green)!important;background:rgba(57,217,138,.15)!important;color:var(--green)!important}
.opt.wrong-ans{border-color:var(--red)!important;background:rgba(255,77,109,.12)!important;color:var(--red)!important}
.opt-lbl{font-weight:700;color:var(--teal);min-width:16px;font-size:13px}
.q-feedback{margin-top:9px;font-size:12px;padding:7px 11px;border-radius:7px;display:none}
.q-feedback.show{display:block}
.q-feedback.ok{background:rgba(57,217,138,.1);color:var(--green);border:1px solid rgba(57,217,138,.25)}
.q-feedback.err{background:rgba(255,77,109,.1);color:#ff8099;border:1px solid rgba(255,77,109,.2)}

/* ADEVĂRAT/FALS */
.tf-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;transition:all .2s}
.tf-card.correct{border-color:var(--green);background:rgba(57,217,138,.07)}
.tf-card.wrong{border-color:var(--red);background:rgba(255,77,109,.07)}
.tf-text{font-size:13.5px;color:var(--txt);line-height:1.6;margin-bottom:12px}
.tf-btns{display:flex;gap:8px}
.tf-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:transparent;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .16s;color:var(--txt2)}
.tf-btn.t:hover,.tf-btn.t.picked{border-color:var(--green);background:rgba(57,217,138,.15);color:var(--green)}
.tf-btn.f:hover,.tf-btn.f.picked{border-color:var(--red);background:rgba(255,77,109,.12);color:var(--red)}
.tf-btn.t.correct,.tf-btn.f.correct{border-color:var(--green);background:rgba(57,217,138,.2);color:var(--green)}
.tf-btn.t.wrong,.tf-btn.f.wrong{border-color:var(--red);background:rgba(255,77,109,.15);color:var(--red)}

/* POTRIVIRE */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:540px){.match-wrap{grid-template-columns:1fr}}
.match-col h4{font-size:10px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:9px;text-align:center}
.drag-item{background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:9px 13px;margin-bottom:6px;font-size:12.5px;color:var(--txt);cursor:grab;transition:all .18s;user-select:none;display:flex;align-items:center;gap:8px}
.drag-item:active{cursor:grabbing;transform:scale(.97)}
.drag-item.dragging{opacity:.4;border-color:var(--teal)}
.drag-item.matched{border-color:var(--green);background:rgba(57,217,138,.1);cursor:default}
.drag-ico{font-size:15px}
.drop-zone{background:rgba(0,212,170,.04);border:2px dashed rgba(0,212,170,.2);border-radius:9px;padding:9px 13px;margin-bottom:6px;min-height:42px;font-size:12.5px;color:var(--txt3);transition:all .18s;display:flex;align-items:center;gap:8px}
.drop-zone.drag-over{border-color:var(--teal);background:var(--teal-dim);color:var(--teal)}
.drop-zone.filled{border-style:solid;border-color:var(--border);color:var(--txt);background:var(--card)}
.drop-zone.correct-drop{border-color:var(--green);background:rgba(57,217,138,.1)}
.drop-zone.wrong-drop{border-color:var(--red);background:rgba(255,77,109,.1)}
.drop-label{font-size:11px;color:var(--txt3);margin-bottom:3px}
.match-set{margin-bottom:32px}
.match-set-title{font-family:var(--serif);font-size:13px;color:var(--gold);margin-bottom:12px;letter-spacing:1px}

/* BUTOANE */
.check-btn{display:block;margin:16px auto;padding:10px 28px;background:transparent;border:1.5px solid var(--teal);border-radius:50px;color:var(--teal);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.check-btn:hover{background:var(--teal-dim)}
.reset-btn{display:flex;align-items:center;gap:6px;margin:10px auto;padding:7px 18px;background:transparent;border:1.5px solid var(--border);border-radius:50px;color:var(--txt2);font-family:var(--font);font-size:11.5px;cursor:pointer;transition:all .18s}
.reset-btn:hover{border-color:var(--gold);color:var(--gold)}

/* RESULT */
.result-card{background:linear-gradient(135deg,rgba(0,212,170,.08),rgba(245,166,35,.05));border:1.5px solid var(--teal);border-radius:var(--radius);padding:22px;text-align:center;margin-top:14px;display:none}
.result-card.show{display:block}
.result-emoji{font-size:38px;margin-bottom:7px}
.result-card h3{font-family:var(--serif);font-size:19px;color:var(--teal);margin-bottom:5px}
.result-card p{color:var(--txt2);font-size:13px}
.result-pct{font-size:38px;font-weight:700;color:var(--gold);font-family:var(--serif);margin:7px 0}

/* LEGEND CHIPS */
.chap-legend{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:18px}
.chip{padding:3px 10px;border-radius:20px;font-size:10.5px;border:1px solid var(--border);color:var(--txt3)}

footer{text-align:center;padding:18px;color:var(--txt3);font-size:11px;border-top:1px solid var(--border);position:relative;z-index:5}
</style>
</head>
<body>

<header>
  <div class="hdr-sub">Bacalaureat 2026</div>
  <h1>Exerciții · Geografie</h1>
  <p class="hdr-desc">Grilă · Adevărat/Fals · Potrivire — Programă completă BAC</p>
</header>

<div class="score-bar">
  <div class="score-item"><span class="score-num ok" id="sc-ok">0</span><span>Corecte</span></div>
  <div class="score-sep"></div>
  <div class="score-item"><span class="score-num bad" id="sc-bad">0</span><span>Greșite</span></div>
  <div class="score-sep"></div>
  <div class="score-item"><span class="score-num" id="sc-total">0</span><span>Total</span></div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="showTab('grila',this)"><span class="ico">📝</span> Grilă</button>
  <button class="tab-btn" onclick="showTab('tf',this)"><span class="ico">⚖️</span> Adevărat / Fals</button>
  <button class="tab-btn" onclick="showTab('match',this)"><span class="ico">🔗</span> Potrivire</button>
</div>

<!-- ═══════ GRILĂ ═══════ -->
<div class="section active" id="sec-grila">
  <p class="section-title">Întrebări Grilă</p>
  <div class="chap-select" id="grila-chaps"></div>
  <div id="grila-container"></div>
  <button class="reset-btn" onclick="renderGrila()">↺ Alt set de întrebări</button>
  <div class="result-card" id="grila-result"></div>
</div>

<!-- ═══════ ADEVĂRAT/FALS ═══════ -->
<div class="section" id="sec-tf">
  <p class="section-title">Adevărat sau Fals</p>
  <div class="chap-select" id="tf-chaps"></div>
  <div id="tf-container"></div>
  <button class="reset-btn" onclick="renderTF()">↺ Alt set de enunțuri</button>
  <div class="result-card" id="tf-result"></div>
</div>

<!-- ═══════ POTRIVIRE ═══════ -->
<div class="section" id="sec-match">
  <p class="section-title">Potrivire — Drag &amp; Drop</p>
  <div id="match-container"></div>
  <button class="check-btn" onclick="checkMatch()">✓ Verifică potrivirile</button>
  <button class="reset-btn" onclick="buildMatch()">↺ Regenerează</button>
  <div class="result-card" id="match-result"></div>
</div>

<footer>GeoBac · Exerciții interactive · Programă BAC 2026 — Europa, România, Uniunea Europeană</footer>

<script>
/* ══ SCORE ══ */
let totalOk=0,totalBad=0,totalAns=0;
function addScore(ok){
  ok?totalOk++:totalBad++;totalAns++;
  document.getElementById('sc-ok').textContent=totalOk;
  document.getElementById('sc-bad').textContent=totalBad;
  document.getElementById('sc-total').textContent=totalAns;
}
function showTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('active');
}

    {drag:"Serbia",ico:"🌍",drop:"Belgrad"},
  ]},
];

/* ══ GRILĂ ENGINE ══ */
const gChaps = Object.keys(GRILA_DATA);
let gActive = 'Toate', gAnswered = {}, gCurrent = [];

function buildGrilaChaps(){
  const el = document.getElementById('grila-chaps');
  el.innerHTML = '';
  ['Toate', ...gChaps].forEach(c => {
    const b = document.createElement('button');
    b.className = 'chap-btn' + (c==='Toate'?' active':'');
    b.textContent = c;
    b.onclick = () => {
      document.querySelectorAll('#grila-chaps .chap-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      gActive = c;
      renderGrila();
    };
    el.appendChild(b);
  });
}

function renderGrila(){
  let pool = gActive==='Toate'
    ? Object.values(GRILA_DATA).flat()
    : [...(GRILA_DATA[gActive]||[])];
  gCurrent = pool.sort(()=>Math.random()-.5).slice(0,10);
  gAnswered = {};
  const c = document.getElementById('grila-container');
  c.innerHTML = '';
  document.getElementById('grila-result').classList.remove('show');
  gCurrent.forEach((q,i) => {
    const card = document.createElement('div');
    card.className = 'q-card'; card.id = 'gc-'+i;
    const opts = q.opts.map((o,j) => `
      <div class="opt" onclick="answerGrila(${i},${j})" id="go-${i}-${j}">
        <span class="opt-lbl">${['A','B','C','D'][j]}</span>${o}
      </div>`).join('');
    card.innerHTML = `
      <div class="q-num">ÎNTREBAREA ${i+1} / ${gCurrent.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts">${opts}</div>
      <div class="q-feedback" id="gf-${i}"></div>`;
    c.appendChild(card);
  });
}

function answerGrila(qi, oi){
  if(gAnswered[qi] !== undefined) return;
  gAnswered[qi] = oi;
  const q = gCurrent[qi];
  const correct = oi === q.a;
  addScore(correct);
  document.getElementById(`go-${qi}-${q.a}`).classList.add('correct-ans');
  if(!correct) document.getElementById(`go-${qi}-${oi}`).classList.add('wrong-ans');
  document.getElementById('gc-'+qi).classList.add(correct?'correct':'wrong');
  const fb = document.getElementById('gf-'+qi);
  fb.className = 'q-feedback show ' + (correct?'ok':'err');
  fb.textContent = correct ? '✓ Corect!' : '✗ Greșit. Răspuns corect: '+['A','B','C','D'][q.a]+') '+q.opts[q.a];
  document.querySelectorAll(`[id^="go-${qi}-"]`).forEach(o=>o.style.pointerEvents='none');
  if(Object.keys(gAnswered).length === gCurrent.length) showResult('grila');
}

/* ══ TF ENGINE ══ */
const tfChaps = Object.keys(TF_DATA);
let tfActive = 'Toate', tfAnswered = {}, tfCurrent = [];

function buildTFChaps(){
  const el = document.getElementById('tf-chaps');
  el.innerHTML = '';
  ['Toate', ...tfChaps].forEach(c => {
    const b = document.createElement('button');
    b.className = 'chap-btn' + (c==='Toate'?' active':'');
    b.textContent = c;
    b.onclick = () => {
      document.querySelectorAll('#tf-chaps .chap-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      tfActive = c;
      renderTF();
    };
    el.appendChild(b);
  });
}

function renderTF(){
  let pool = tfActive==='Toate'
    ? Object.values(TF_DATA).flat()
    : [...(TF_DATA[tfActive]||[])];
  tfCurrent = pool.sort(()=>Math.random()-.5).slice(0,12);
  tfAnswered = {};
  const c = document.getElementById('tf-container');
  c.innerHTML = '';
  document.getElementById('tf-result').classList.remove('show');
  tfCurrent.forEach((q,i) => {
    const card = document.createElement('div');
    card.className = 'tf-card'; card.id = 'tfc-'+i;
    card.innerHTML = `
      <div class="q-num">ENUNȚUL ${i+1}</div>
      <div class="tf-text">${q.s}</div>
      <div class="tf-btns">
        <button class="tf-btn t" onclick="answerTF(${i},true)">✓ Adevărat</button>
        <button class="tf-btn f" onclick="answerTF(${i},false)">✗ Fals</button>
      </div>
      <div class="q-feedback" id="tff-${i}"></div>`;
    c.appendChild(card);
  });
}

function answerTF(i, ans){
  if(tfAnswered[i] !== undefined) return;
  tfAnswered[i] = ans;
  const q = tfCurrent[i];
  const correct = ans === q.a;
  addScore(correct);
  const card = document.getElementById('tfc-'+i);
  card.classList.add(correct?'correct':'wrong');
  const btns = card.querySelectorAll('.tf-btn');
  btns.forEach(b => { b.style.pointerEvents='none'; b.style.opacity='.5'; });
  const picked = ans ? btns[0] : btns[1];
  picked.style.opacity = '1';
  picked.classList.add(correct?'correct':'wrong');
  if(!correct){
    const correctBtn = q.a ? btns[0] : btns[1];
    correctBtn.style.opacity='1';
    correctBtn.classList.add('correct');
  }
  const fb = document.getElementById('tff-'+i);
  fb.className = 'q-feedback show ' + (correct?'ok':'err');
  fb.textContent = correct ? '✓ Corect!' : `✗ Fals! ${q.exp||'Răspuns corect: '+(q.a?'Adevărat':'Fals')}`;
  if(Object.keys(tfAnswered).length === tfCurrent.length) showResult('tf');
}

/* ══ RESULT ══ */
function showResult(type){
  const answered = type==='grila' ? gAnswered : tfAnswered;
  const current = type==='grila' ? gCurrent : tfCurrent;
  const ok = Object.entries(answered).filter(([i,o]) =>
    type==='grila' ? current[i].a===o : current[i].a===o
  ).length;
  const tot = current.length;
  const pct = Math.round(ok/tot*100);
  const r = document.getElementById(type+'-result');
  r.innerHTML = `<div class="result-emoji">${pct>=80?'🏆':pct>=60?'👍':'📚'}</div>
    <h3>${pct>=80?'Excelent!':pct>=60?'Bun progres!':'Continuă să exersezi!'}</h3>
    <div class="result-pct">${ok}/${tot}</div>
    <p>${pct}% răspunsuri corecte</p>`;
  r.classList.add('show');
}

/* ══ MATCH ENGINE ══ */
let matchDragSrc = null;

function buildMatch(){
  matchDragSrc = null;
  const c = document.getElementById('match-container');
  c.innerHTML = '';
  document.getElementById('match-result').classList.remove('show');

  // Pick 4 random sets
  const chosen = [...MATCH_SETS].sort(()=>Math.random()-.5).slice(0,4);

  chosen.forEach((set, si) => {
    const div = document.createElement('div');
    div.className = 'match-set';
    const shuffled = [...set.items].sort(()=>Math.random()-.5);
    const leftHTML = shuffled.map((it,j) => `
      <div class="drag-item" draggable="true" id="drag-${si}-${j}"
        data-val="${it.drag}" data-set="${si}"
        ondragstart="dragStart(event,this)" ondragend="dragEnd(event,this)">
        <span class="drag-ico">${it.ico}</span>${it.drag}
      </div>`).join('');
    const rightHTML = set.items.map((it,j) => `
      <div>
        <div class="drop-label">${it.drop}</div>
        <div class="drop-zone" id="drop-${si}-${j}"
          data-set="${si}" data-target="${it.drag}"
          ondragover="dragOver(event,this)"
          ondragleave="dragLeave(event,this)"
          ondrop="doDrop(event,this)">Trage aici →</div>
      </div>`).join('');
    div.innerHTML = `
      <div class="match-set-title">📌 ${set.title}</div>
      <div class="match-wrap">
        <div><h4>Elemente</h4>${leftHTML}</div>
        <div><h4>Categorii</h4>${rightHTML}</div>
      </div>`;
    c.appendChild(div);
  });
}

function dragStart(e,el){ matchDragSrc=el; el.classList.add('dragging'); e.dataTransfer.setData('text',el.dataset.val+':'+el.dataset.set); }
function dragEnd(e,el){ el.classList.remove('dragging'); }
function dragOver(e,el){ e.preventDefault(); el.classList.add('drag-over'); }
function dragLeave(e,el){ el.classList.remove('drag-over'); }

function doDrop(e, dropEl){
  e.preventDefault();
  dropEl.classList.remove('drag-over');
  const [val, si] = e.dataTransfer.getData('text').split(':');
  if(dropEl.dataset.set !== si) return;
  // Clear previous placement of this drag item
  document.querySelectorAll('.drop-zone').forEach(dz => {
    if(dz.dataset.currentDrag === val && dz !== dropEl){
      dz.innerHTML = 'Trage aici →';
      dz.classList.remove('filled');
      dz.dataset.currentDrag = '';
    }
  });
  dropEl.innerHTML = `<span style="margin-right:6px">${matchDragSrc.querySelector('.drag-ico').textContent}</span>${val}`;
  dropEl.classList.add('filled');
  dropEl.dataset.currentDrag = val;
  matchDragSrc.classList.add('matched');
  matchDragSrc.setAttribute('draggable','false');
}

function checkMatch(){
  let ok=0, tot=0;
  document.querySelectorAll('.drop-zone').forEach(dz => {
    if(!dz.dataset.currentDrag) return;
    tot++;
    const correct = dz.dataset.currentDrag === dz.dataset.target;
    dz.classList.remove('filled');
    dz.classList.add(correct ? 'correct-drop' : 'wrong-drop');
    if(correct){ok++; addScore(true);} else {addScore(false);}
  });
  const pct = tot>0 ? Math.round(ok/tot*100) : 0;
  const r = document.getElementById('match-result');
  r.innerHTML = `<div class="result-emoji">${pct>=80?'🎯':pct>=60?'👍':'🔄'}</div>
    <h3>${pct>=80?'Potriviri perfecte!':pct>=60?'Aproape acolo!':'Mai încearcă!'}</h3>
    <div class="result-pct">${ok}/${tot}</div>
    <p>${pct}% potriviri corecte</p>`;
  r.classList.add('show');
}

/* ══ INIT ══ */
buildGrilaChaps();
renderGrila();
buildTFChaps();
renderTF();
buildMatch();
</script>
