<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resetează parola · GeoBac</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230c1117'/%3E%3Ccircle cx='50' cy='50' r='26' fill='none' stroke='%2300d4aa' stroke-width='5'/%3E%3Cpath d='M24 50h52M50 24v52' stroke='%2300d4aa' stroke-width='3.5' opacity='.45'/%3E%3Ccircle cx='50' cy='50' r='5' fill='%23f5a623'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0c1117;--surface:rgba(255,255,255,0.04);--border2:rgba(255,255,255,0.14);--text:#e8e6e1;--text2:rgba(232,230,225,0.65);--text3:rgba(232,230,225,0.40);--teal:#00d4aa;--coral:#ff6b6b;--blue:#5b9cf6;--font:'Outfit',sans-serif;--body:'DM Sans',sans-serif;}
html,body{height:100%;}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(ellipse 60% 40% at 30% 15%,rgba(0,212,170,0.08) 0%,transparent 60%),var(--bg);}
nav{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;max-width:1200px;width:100%;margin:0 auto;}
.logo{font-family:var(--font);font-weight:800;font-size:20px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
.logo span{background:linear-gradient(135deg,var(--teal),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);}
.back{font-family:var(--font);font-size:13px;color:var(--text3);text-decoration:none;font-weight:500;}
.back:hover{color:var(--teal);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.card{max-width:440px;width:100%;padding:44px 36px;border-radius:22px;background:var(--surface);border:1px solid var(--border2);backdrop-filter:blur(20px);}
.card-head{text-align:center;margin-bottom:28px;}
.card-icon{width:56px;height:56px;margin:0 auto 16px;border-radius:16px;background:linear-gradient(135deg,rgba(0,212,170,0.2),rgba(91,156,246,0.15));border:1px solid rgba(0,212,170,0.25);display:flex;align-items:center;justify-content:center;font-size:26px;}
.card h1{font-family:var(--font);font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
.card .sub{color:var(--text2);font-size:14px;line-height:1.5;}
.field{margin-bottom:16px;}
label{display:block;font-family:var(--font);font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;}
input{width:100%;padding:14px 16px;border-radius:10px;font-family:var(--body);font-size:15px;color:var(--text);background:rgba(0,0,0,0.3);border:1px solid var(--border2);outline:none;transition:all 0.2s;}
input:focus{border-color:var(--teal);background:rgba(0,0,0,0.45);box-shadow:0 0 0 3px rgba(0,212,170,0.12);}
.msg{padding:12px 14px;border-radius:9px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px;}
.msg.show{display:flex;}
.msg.err{background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.3);color:var(--coral);}
.msg.ok{background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.3);color:var(--teal);}
.msg .ico{font-size:16px;flex-shrink:0;}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:15px;border-radius:11px;font-family:var(--font);font-weight:700;font-size:15px;color:var(--bg);background:linear-gradient(135deg,var(--teal),#00b894);border:none;cursor:pointer;transition:all 0.3s;margin-top:8px;}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,212,170,0.35);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.login-link{margin-top:18px;text-align:center;color:var(--text3);font-size:13px;}
.login-link a{color:var(--teal);text-decoration:none;font-weight:600;}
footer{text-align:center;padding:22px;font-size:12px;color:var(--text3);}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><span class="dot"></span>Geo<span>Bac</span></a>
  <a href="login.html" class="back">← Înapoi la login</a>
</nav>
<main>
  <div class="card">
    <div class="card-head">
      <div class="card-icon">🔒</div>
      <h1>Ai uitat parola?</h1>
      <p class="sub">Introdu emailul și îți trimitem un link de resetare.</p>
    </div>
    <div id="msg" class="msg"></div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="adresa@email.com" autocomplete="email">
    </div>
    <button class="btn" id="resetBtn">Trimite link de resetare →</button>
    <p class="login-link">Ți-ai amintit? <a href="login.html">Intră în cont</a></p>
  </div>
</main>
<footer>GeoBac · 2026</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const db = supabase.createClient(
  'https://bxbefvelonocuheavsri.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4YmVmdmVsb25vY3VoZWF2c3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTk5MzAsImV4cCI6MjA5Mjc5NTkzMH0.lRJX8JITWrBl1Mb6IeETtwBddTEOw7FI5isa9oGsGDA'
);
const emailEl = document.getElementById('email');
const resetBtn = document.getElementById('resetBtn');
const msgEl = document.getElementById('msg');

function showMsg(text, type) {
msgEl.className = ’msg show ’ + type;
msgEl.innerHTML = ‘<span class="ico">’ + (type === ‘ok’ ? ‘✓’ : ‘✕’) + ‘</span>’ + text;
}

resetBtn.addEventListener(‘click’, async () => {
const email = emailEl.value.trim();
if (!email || !email.includes(’@’)) {
showMsg(‘Introdu un email valid.’, ‘err’); return;
}
resetBtn.disabled = true;
resetBtn.textContent = ‘Se trimite…’;
const { error } = await db.auth.resetPasswordForEmail(email, {
redirectTo: location.origin + ‘/reset-password.html’
});
if (error) {
showMsg(’Eroare: ’ + error.message, ‘err’);
resetBtn.disabled = false;
resetBtn.textContent = ‘Trimite link de resetare →’;
} else {
showMsg(‘Email trimis! Verifică inbox-ul (și spam-ul).’, ‘ok’);
}
});
</script>

</body>
</html>
