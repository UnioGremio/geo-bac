<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:#0c1117;display:flex;align-items:center;justify-content:center;height:100vh;}
.spin{width:32px;height:32px;border:3px solid rgba(0,212,170,0.2);border-top-color:#00d4aa;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="spin"></div>
<script>
var SUPABASE_URL = 'https://bxbefvelonocuheavsri.supabase.co';
var raw = localStorage.getItem('sb-bxbefvelonocuheavsri-auth-token');
if(!raw){ location.href='login.html'; }
else {
  var session = JSON.parse(raw);
  fetch(SUPABASE_URL + '/functions/v1/serve-page?page=romania.html', {
    headers: { 'Authorization': 'Bearer ' + session.access_token }
  })
  .then(function(r){
    if(r.status === 401){ location.href='login.html'; return null; }
    if(r.status === 403){ location.href='index.html?motiv=neplata'; return null; }
    return r.text();
  })
  .then(function(html){
    if(html){ document.open(); document.write(html); document.close(); }
  });
}
</script>
</body>
</html>
