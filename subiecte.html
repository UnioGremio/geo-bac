<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">

  <script src="auth.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0c1117;--bg2:#131920;--bg3:#1a2230;
      --teal:#00d4aa;--amber:#f5a623;--coral:#ff6b6b;
      --text:#f5f0e8;--text2:#c8bfaa;--text3:#8a7a5a;
      --border:rgba(255,252,245,0.08);
    }
    body{background:var(--bg);color:var(--text2);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.6;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

    /* HEADER */
    .phdr{background:rgba(10,14,20,0.95);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:50;flex-shrink:0;}
    .phdr .logo{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
    .phdr .logo span{color:var(--teal);}
    .phdr .title{font-size:13px;color:var(--text3);margin-left:4px;}
    .phdr a{margin-left:auto;font-size:11px;color:var(--text3);text-decoration:none;}
    .phdr a:hover{color:var(--teal);}

    /* LAYOUT */
    .layout{display:flex;flex:1;overflow:hidden;}

    /* SIDEBAR */
    .sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;}
    .sidebar-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);padding:0 14px 8px;}

    .year-group{border-bottom:1px solid var(--border);}
    .year-btn{width:100%;background:none;border:none;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;transition:background 0.15s;}
    .year-btn:hover{background:rgba(255,252,245,0.04);}
    .year-btn.active{color:var(--teal);background:rgba(0,212,170,0.06);}
    .year-btn .arrow{font-size:9px;transition:transform 0.2s;color:var(--text3);}
    .year-btn.open .arrow{transform:rotate(90deg);}

    .sessions{display:none;padding:0 0 6px;}
    .sessions.open{display:block;}
    .sess-btn{width:100%;background:none;border:none;padding:7px 14px 7px 26px;text-align:left;cursor:pointer;font-size:12px;color:var(--text3);font-family:inherit;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
    .sess-btn:hover{color:var(--text2);background:rgba(255,252,245,0.03);}
    .sess-btn.active{color:var(--amber);background:rgba(245,166,35,0.08);}
    .sess-badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:0.3px;}
    .sess-badge.iunie{background:rgba(0,212,170,0.15);color:var(--teal);}
    .sess-badge.august{background:rgba(245,166,35,0.15);color:var(--amber);}
    .sess-badge.model{background:rgba(91,156,246,0.15);color:#5b9cf6;}

    /* MAIN VIEWER */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

    .viewer-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .viewer-bar .label{font-size:12px;color:var(--text);font-weight:600;}
    .viewer-bar .sublabel{font-size:11px;color:var(--text3);}
    .viewer-bar .spacer{flex:1;}
    .btn-dl{background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3);color:var(--amber);padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;transition:background 0.15s;}
    .btn-dl:hover{background:rgba(245,166,35,0.25);}
    .btn-barem{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.25);color:var(--teal);padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;transition:background 0.15s;}
    .btn-barem:hover{background:rgba(0,212,170,0.2);}

    .viewer-frame{flex:1;position:relative;background:var(--bg);}
    .viewer-frame iframe{width:100%;height:100%;border:none;display:block;}

    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text3);}
    .empty-state .icon{font-size:48px;opacity:0.4;}
    .empty-state h3{font-size:16px;color:var(--text2);font-weight:600;}
    .empty-state p{font-size:12px;text-align:center;max-width:260px;line-height:1.6;}

    /* MOBILE */
    @media(max-width:600px){
      body{overflow:auto;}
      .layout{flex-direction:column;overflow:auto;}
      .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);overflow:visible;max-height:none;}
      .main{overflow:visible;}
      .viewer-frame{height:70vh;}
      .viewer-bar{flex-wrap:wrap;gap:6px;}
    }
    @media(max-width:400px){
      .sidebar{font-size:13px;}
      .phdr .title{display:none;}
    }
  </style>

// ─── Build sidebar ───────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('yearList');
  SUBIECTE.forEach(function(y) {
    const grp = document.createElement('div');
    grp.className = 'year-group';

    const btn = document.createElement('button');
    btn.className = 'year-btn';
    btn.innerHTML = '<span>' + y.an + '</span><span class="arrow">▶</span>';
    btn.onclick = function() {
      const sess = grp.querySelector('.sessions');
      const isOpen = sess.classList.contains('open');
      // Close all
      document.querySelectorAll('.sessions.open').forEach(function(s){ s.classList.remove('open'); });
      document.querySelectorAll('.year-btn.open').forEach(function(b){ b.classList.remove('open'); });
      if (!isOpen) {
        sess.classList.add('open');
        btn.classList.add('open');
      }
    };

    const sessions = document.createElement('div');
    sessions.className = 'sessions';

    y.sesiuni.forEach(function(s) {
      const sb = document.createElement('button');
      sb.className = 'sess-btn';
      sb.innerHTML = '<span class="sess-badge ' + s.badge + '">' + s.badge.toUpperCase() + '</span>' + s.label;
      sb.onclick = function() {
        document.querySelectorAll('.sess-btn.active').forEach(function(b){ b.classList.remove('active'); });
        document.querySelectorAll('.year-btn.active').forEach(function(b){ b.classList.remove('active'); });
        sb.classList.add('active');
        btn.classList.add('active');
        loadSubiect(y.an, s);
      };
      sessions.appendChild(sb);
    });

    grp.appendChild(btn);
    grp.appendChild(sessions);
    list.appendChild(grp);
  });

  // Auto-open 2024
  const first = list.querySelector('.year-btn');
  if (first) first.click();
}

// ─── Load subject in viewer ───────────────────────────────────
function loadSubiect(an, s) {
  const frame = document.getElementById('pdfFrame');
  const empty = document.getElementById('emptyState');
  const bar = document.getElementById('viewerBar');
  const label = document.getElementById('vLabel');
  const btnDl = document.getElementById('btnDl');
  const btnBarem = document.getElementById('btnBarem');

  label.textContent = 'BAC ' + an + ' · ' + s.label;
  btnDl.href = s.zipUrl;
  btnBarem.href = s.baremUrl;
  bar.style.display = 'flex';

  if (s.pdfUrl) {
    // Use Google Docs Viewer for direct PDF
    const viewUrl = 'https://docs.google.com/viewer?url=' + encodeURIComponent(s.pdfUrl) + '&embedded=true';
    frame.src = viewUrl;
    frame.style.display = 'block';
    empty.style.display = 'none';
  } else {
    // ZIP — show download prompt
    frame.style.display = 'none';
    empty.style.display = 'flex';
    empty.innerHTML = '<div class="icon">📦</div>' +
      '<h3>BAC ' + an + ' · ' + s.label + '</h3>' +
      '<p>Subiectele sunt disponibile ca arhivă ZIP (conțin toate disciplinele din proba E.d).</p>' +
      '<a href="' + s.zipUrl + '" target="_blank" rel="noopener" style="margin-top:8px;background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3);color:#f5a623;padding:8px 20px;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none;">⬇ Descarcă arhiva ZIP de pe edu.ro</a>' +
      '<p style="margin-top:12px;font-size:11px;color:#5a4a3a;">ZIP-ul conține subiectul + baremul la Geografie și celelalte discipline din profil.<br>Sursa oficială: Ministerul Educației · subiecte' + an + '.edu.ro</p>';
  }
}
