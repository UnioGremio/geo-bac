function activateOverlay(mode) {
  // Close any other overlay
  deactivateOverlay(true);
  activeOverlay = mode;
  // Keep relief visible as context (valuable for learning), but make it
  // non-interactive so clicks pass through to countries below
  setReliefInteractive(false);

  // Open panel and update buttons
  document.querySelectorAll('.modebut').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.slidepan').forEach(function(p){ p.classList.remove('open'); });

  if(mode==='clima') {
    document.getElementById('climobtn').classList.add('active');
    document.getElementById('clipanel').classList.add('open');
    renderClimaLayer();
  } else if(mode==='biop') {
    document.getElementById('biopbtn').classList.add('active');
    document.getElementById('biopanel').classList.add('open');
    renderBiopLayer();
  } else if(mode==='res') {
    document.getElementById('resbtn').classList.add('active');
    document.getElementById('respanel').classList.add('open');
    renderResLayer();
  } else if(mode==='hidro') {
    document.getElementById('hidrobtn').classList.add('active');
    document.getElementById('hidrpanel').classList.add('open');
    renderHidrLayer();
  }
}

function deactivateOverlay(silent) {
  clearOverlayLayers();
  activeOverlay = null;
  // Restore relief
  if(lRelief && !map.hasLayer(lRelief)) lRelief.addTo(map);
  if(lPeaks && !map.hasLayer(lPeaks)) lPeaks.addTo(map);
  // Re-enable relief interactivity (respecting HIDDEN_BY_DEFAULT)
  setReliefInteractive(true);
  document.querySelectorAll('.modebut').forEach(function(b){ b.classList.remove('active'); });
  if(!silent) {
    document.querySelectorAll('.slidepan').forEach(function(p){ p.classList.remove('open'); });
  }
}

function buildMaterie() {
  var cc = document.getElementById('matchapters');
  cc.innerHTML = '';
  Object.keys(MATERIE).forEach(function(k) {
    var b = document.createElement('button');
    b.className = 'matchap' + (k===currentChapter?' active':'');
    b.textContent = MATERIE[k].label;
    b.onclick = function() {
      currentChapter = k;
      currentTab = Object.keys(MATERIE[k].tabs)[0];
      document.querySelectorAll('.matchap').forEach(function(x){ x.classList.remove('active'); });
      b.classList.add('active');
      renderTabs();
      renderTab(currentTab);
    };
    cc.appendChild(b);
  });
  currentTab = Object.keys(MATERIE[currentChapter].tabs)[0];
  renderTabs();
  renderTab(currentTab);
}

function renderTabs() {
  var tc = document.getElementById('mattabs');
  tc.innerHTML = '';
  var tabs = MATERIE[currentChapter].tabs;
  Object.keys(tabs).forEach(function(k) {
    var b = document.createElement('button');
    b.className = 'mattab' + (k===currentTab?' active':'');
    b.textContent = tabs[k].title;
    b.onclick = function() {
      currentTab = k;
      document.querySelectorAll('.mattab').forEach(function(x){ x.classList.remove('active'); });
      b.classList.add('active');
      renderTab(k);
    };
    tc.appendChild(b);
  });
}

function renderTab(tabKey) {
  var data = MATERIE[currentChapter].tabs[tabKey];
  if(!data) return;
  var h = '';
  data.sections.forEach(function(s) {
    var body = s.p.replace(/\[([^\]]+)\]/g, function(m, name) {
      return '<span class="link" data-relief="'+name+'">'+name+'</span>';
    });
    h += '<h3>'+s.h+'</h3><p>'+body+'</p>';
  });
  document.getElementById('matcontent').innerHTML = h;
  document.getElementById('matcontent').scrollTop = 0;
  document.getElementById('matcontent').querySelectorAll('.link').forEach(function(el) {
    el.onclick = function() {
      document.querySelectorAll('#matcontent .link').forEach(function(x){ x.classList.remove('highlighted'); });
      document.querySelectorAll('#matcontent .link[data-relief="'+el.dataset.relief+'"]').forEach(function(x){ x.classList.add('highlighted'); });
      var layer = reliefByName[el.dataset.relief];
      // Hide ALL relief shapes, then show only the clicked one
      hideAllReliefShapes();
      if(layer) {
        try { map.flyToBounds(layer.getBounds(), {duration:1, maxZoom:7}); } catch(e){}
        layer.setStyle({fillOpacity:0.85, weight:2.4, color:'#e04020', opacity:1});
        var elL = layer.getElement && layer.getElement();
        if(elL) elL.style.pointerEvents = '';
        layer.bringToFront();
        setTimeout(function(){ layer.openPopup(); }, 800);
      }
    };
  });
}

// Hide all relief polygons (used when materie panel is active — only the clicked
// unit should be visible to avoid map clutter and aid focused learning)
function hideAllReliefShapes() {
  if(!lRelief) return;
  lRelief.eachLayer(function(l){
    l.setStyle({fillOpacity:0, opacity:0, weight:0});
    var el = l.getElement && l.getElement();
    if(el) el.style.pointerEvents = 'none';
  });
}

document.getElementById('matbtn').onclick = function() {
  var pan = document.getElementById('matpanel');
  var isOpen = pan.classList.contains('open');
  // Close overlay panels
  document.querySelectorAll('.slidepan').forEach(function(p){ p.classList.remove('open'); });
  if(!isOpen) {
    pan.classList.add('open');
    this.classList.add('active');
    // Hide all relief shapes — they will appear one at a time on click
    hideAllReliefShapes();
  } else {
    this.classList.remove('active');
    resetReliefStyle();
  }
};
document.getElementById('matclose').onclick = function() {
  document.getElementById('matpanel').classList.remove('open');
  document.getElementById('matbtn').classList.remove('active');
  resetReliefStyle();
  document.querySelectorAll('#matcontent .link').forEach(function(x){ x.classList.remove('highlighted'); });
  map.closePopup();
};

// ===================== CAPITALS =====================
var capsVisible = true;
document.getElementById('capbtn').onclick = function() {
  var menu = document.getElementById('capmenu');
  menu.classList.toggle('open');
  this.classList.toggle('active', menu.classList.contains('open'));
};

function buildCapList(filter) {
  var el = document.getElementById('caplist');
  el.innerHTML = '';
  var f = (filter||'').toLowerCase();
  var sorted = CAPITALS.slice().sort(function(a,b){ return a[0].localeCompare(b[0],'ro'); });
  sorted.forEach(function(c) {
    if(f && c[0].toLowerCase().indexOf(f)===-1 && c[1].toLowerCase().indexOf(f)===-1) return;
    var d = document.createElement('div');
    d.className = 'capitem';
    d.innerHTML = '<span>'+c[0]+'</span><span class="cnt">'+c[1]+'</span>';
    d.onclick = function() {
      map.flyTo([c[3], c[2]], 7, {duration:1.2});
      document.getElementById('capmenu').classList.remove('open');
      document.getElementById('capbtn').classList.remove('active');
    };
    el.appendChild(d);
  });
}
document.getElementById('capsearch').oninput = function() { buildCapList(this.value); };

// ===================== MISC =====================
// Close panels on map click
map.on('click', function() {
  document.getElementById('capmenu').classList.remove('open');
  document.getElementById('capbtn').classList.remove('active');
});

// Resize handling
window.addEventListener('resize', function(){ map.invalidateSize(); });
</script>
